<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐆 Flappy Pars</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a3a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none}
canvas{display:block;touch-action:none}
#menu{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0d2b1a,#1a472a);z-index:20}
#menu h1{font-size:48px;color:#ffd700;text-shadow:0 0 30px #ffd700;margin-bottom:8px;font-family:Arial Black,sans-serif;letter-spacing:2px}
#menu .sub{font-size:16px;color:#90ee90;margin-bottom:30px;letter-spacing:3px;font-family:Arial,sans-serif}
#menu .pars{font-size:90px;margin-bottom:15px;animation:bounce 1s ease-in-out infinite}
.play-btn{background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;padding:20px 60px;border-radius:50px;font-size:26px;font-weight:bold;color:#1a0a2e;cursor:pointer;font-family:Arial Black,sans-serif;-webkit-tap-highlight-color:transparent;box-shadow:0 8px 25px rgba(255,215,0,0.4)}
#oldu{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:20}
#oldu h2{font-size:44px;color:#ff4444;font-family:Arial Black,sans-serif;margin-bottom:15px}
#oldu .s1{font-size:30px;color:#ffd700;font-family:Arial,sans-serif;margin-bottom:8px}
#oldu .s2{font-size:18px;color:#90ee90;font-family:Arial,sans-serif;margin-bottom:35px}
#skor{position:fixed;top:15px;left:50%;transform:translateX(-50%);font-size:52px;font-weight:bold;color:white;text-shadow:3px 3px 0 #000,0 0 20px #ffd700;z-index:10;font-family:Arial Black,sans-serif;pointer-events:none}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
</style>
</head>
<body>
<div id="menu">
  <div class="pars">🐆</div>
  <h1>FLAPPY PARS</h1>
  <p class="sub">ORMAN MACERASI</p>
  <button class="play-btn" id="playBtn">▶ OYNA</button>
</div>
<div id="skor" style="display:none">0</div>
<div id="oldu">
  <h2>💀 ÇARPTIN!</h2>
  <div class="s1" id="sonSkor">Skor: 0</div>
  <div class="s2" id="enYuksekGoster">En Yüksek: 0</div>
  <button class="play-btn" id="tekrarBtn">🔄 TEKRAR</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
const W=canvas.width,H=canvas.height;

let pars,borular,skor,enYuksek=0,aktif=false,raf,ilkZiplama=false;

const BGENISLIK=Math.floor(W*0.15);
const ARALIK=Math.floor(H*0.32);
const PARSBOY=Math.floor(W*0.11);
const PARSX=W*0.25;

// Fizik
const YER_YAVASH=0.06;   // ilk zıplamadan önce yavaş düşüş
const YER_NORMAL=0.28;   // normal yerçekimi
const ZIPLAMA=-H*0.008;  // zıplama gücü

function baslat(){
  document.getElementById('menu').style.display='none';
  document.getElementById('oldu').style.display='none';
  document.getElementById('skor').style.display='block';
  pars={y:H/2,vy:0};
  borular=[];
  skor=0;
  aktif=true;
  ilkZiplama=false;
  document.getElementById('skor').textContent='0';
  if(raf)cancelAnimationFrame(raf);
  loop();
}

document.getElementById('playBtn').addEventListener('click',baslat);
document.getElementById('playBtn').addEventListener('touchend',function(e){e.preventDefault();baslat();});
document.getElementById('tekrarBtn').addEventListener('click',baslat);
document.getElementById('tekrarBtn').addEventListener('touchend',function(e){e.preventDefault();baslat();});

function zipla(){
  if(!aktif)return;
  ilkZiplama=true;
  pars.vy=ZIPLAMA;
}

canvas.addEventListener('click',zipla);
canvas.addEventListener('touchstart',function(e){e.preventDefault();zipla();},{passive:false});
document.addEventListener('keydown',function(e){if(e.code==='Space')zipla();});

function loop(){
  if(!aktif)return;

  const hiz=Math.min(2+skor*0.06,6.5);
  const yerCekimi=ilkZiplama
    ?Math.min(YER_NORMAL+skor*0.005,0.55)
    :YER_YAVASH;

  pars.vy+=yerCekimi;
  pars.y+=pars.vy;

  // Boru ekle
  if(borular.length===0||borular[borular.length-1].x<W-W*0.6)boruEkle();

  // Boruları güncelle
  for(let i=borular.length-1;i>=0;i--){
    borular[i].x-=hiz;
    if(!borular[i].gecildi&&borular[i].x+BGENISLIK<PARSX){
      borular[i].gecildi=true;
      skor++;
      document.getElementById('skor').textContent=skor;
    }
    if(borular[i].x+BGENISLIK<0)borular.splice(i,1);
  }

  // Çarpışma
  if(pars.y-PARSBOY/2<0||pars.y+PARSBOY/2>H-15){oldu();return;}
  for(const b of borular){
    if(PARSX+PARSBOY/2-10>b.x&&PARSX-PARSBOY/2+10<b.x+BGENISLIK){
      if(pars.y-PARSBOY/2+10<b.ust||pars.y+PARSBOY/2-10>b.alt){oldu();return;}
    }
  }

  ciz();
  raf=requestAnimationFrame(loop);
}

function boruEkle(){
  const min=H*0.15,max=H-ARALIK-H*0.15;
  const ust=Math.random()*(max-min)+min;
  borular.push({x:W+BGENISLIK,ust:ust,alt:ust+ARALIK,gecildi:false});
}

function ciz(){
  // Arkaplan
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a1f10');
  g.addColorStop(0.6,'#1a472a');
  g.addColorStop(1,'#0d2b10');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);

  // Borular
  for(const b of borular){
    const gb=ctx.createLinearGradient(b.x,0,b.x+BGENISLIK,0);
    gb.addColorStop(0,'#1a4a10');
    gb.addColorStop(0.4,'#3a8a20');
    gb.addColorStop(1,'#0d2b08');
    ctx.fillStyle=gb;
    ctx.fillRect(b.x,0,BGENISLIK,b.ust);
    ctx.fillStyle='#4aaa28';
    ctx.fillRect(b.x-10,b.ust-30,BGENISLIK+20,30);
    ctx.fillStyle='#3a8a20';
    ctx.fillRect(b.x-10,b.ust-35,BGENISLIK+20,8);
    ctx.fillStyle=gb;
    ctx.fillRect(b.x,b.alt,BGENISLIK,H-b.alt);
    ctx.fillStyle='#4aaa28';
    ctx.fillRect(b.x-10,b.alt,BGENISLIK+20,30);
    ctx.fillStyle='#3a8a20';
    ctx.fillRect(b.x-10,b.alt+22,BGENISLIK+20,8);
  }

  // Zemin
  ctx.fillStyle='#2d6a18';
  ctx.fillRect(0,H-15,W,15);

  // Pars
  ctx.save();
  ctx.translate(PARSX,pars.y);
  ctx.font=PARSBOY+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('🐆',0,0);
  ctx.restore();

  // En yüksek
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font='bold 14px Arial';
  ctx.textAlign='right';
  ctx.fillText('EN YÜKSEK: '+enYuksek,W-10,25);
}

function oldu(){
  aktif=false;
  cancelAnimationFrame(raf);
  if(skor>enYuksek)enYuksek=skor;
  document.getElementById('skor').style.display='none';
  document.getElementById('sonSkor').textContent='Skor: '+skor;
  document.getElementById('enYuksekGoster').textContent='En Yüksek: '+enYuksek;
  document.getElementById('oldu').style.display='flex';
}
</script>
</body>
</html>
