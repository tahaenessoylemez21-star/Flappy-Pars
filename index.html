<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Pars</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#07070f;
  font-family:'Press Start 2P',monospace;
  overflow:hidden; color:#d0d0ff;
}
body::before {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  pointer-events:none; z-index:1000;
}
#menu {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh; gap:14px; padding:20px;
}
#menu h1 {
  font-family:'Orbitron',monospace; font-weight:900;
  font-size:clamp(1.3rem,6vw,2.8rem);
  letter-spacing:0.2em; text-align:center; margin-bottom:6px;
}
.t1{color:#ffbe0b;text-shadow:0 0 15px #ffbe0b,0 0 40px #ffbe0b;}
.t2{color:#ff006e;text-shadow:0 0 15px #ff006e,0 0 40px #ff006e;}
.pars-big{font-size:clamp(3.5rem,12vw,6rem);animation:bounce 1.2s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,190,11,0.9));}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.start-btn{background:transparent;border:2px solid #ff006e;color:#ff006e;font-family:'Press Start 2P',monospace;font-size:clamp(0.6rem,2.5vw,0.85rem);padding:16px 28px;cursor:pointer;letter-spacing:0.15em;text-shadow:0 0 10px #ff006e;border-radius:4px;animation:glow 2s infinite;width:100%;max-width:320px;}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(255,0,110,0.3)}50%{box-shadow:0 0 32px rgba(255,0,110,0.7)}}
.start-btn:active{background:rgba(255,0,110,0.2);transform:scale(0.97);}
.menu-lb{width:100%;max-width:380px;background:rgba(255,0,110,0.06);border:1px solid rgba(255,0,110,0.2);border-radius:6px;padding:14px;}
.menu-lb h3{font-size:clamp(0.4rem,1.8vw,0.55rem);color:#ffbe0b;text-shadow:0 0 8px #ffbe0b;text-align:center;margin-bottom:12px;letter-spacing:0.1em;}
.lb-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;margin-bottom:4px;background:rgba(255,255,255,0.03);border-radius:3px;gap:8px;}
.lb-rank{font-size:clamp(0.3rem,1.5vw,0.42rem);min-width:24px;color:#4a4a6a;}
.lb-rank.g{color:#ffbe0b;text-shadow:0 0 6px #ffbe0b;}
.lb-rank.s{color:#aaaacc;}
.lb-rank.b{color:#cc8844;}
.lb-name{font-size:clamp(0.3rem,1.5vw,0.42rem);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#d0d0ff;}
.lb-score{font-size:clamp(0.3rem,1.5vw,0.42rem);color:#ff006e;text-shadow:0 0 4px #ff006e;}
.lb-empty{font-size:clamp(0.28rem,1.3vw,0.38rem);color:#4a4a6a;text-align:center;padding:10px;}
#game{display:none;position:fixed;inset:0;}
#game-canvas{display:block;width:100%;height:100%;}
#hud{display:none;position:fixed;top:0;left:0;right:0;padding:8px 14px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,0,110,0.2);z-index:500;flex-direction:row;align-items:center;justify-content:space-between;}
.hud-left{display:flex;flex-direction:column;gap:4px;}
.hud-coins{font-size:clamp(0.42rem,2vw,0.6rem);color:#ffbe0b;text-shadow:0 0 8px #ffbe0b;}
.hud-level{font-size:clamp(0.38rem,1.8vw,0.54rem);color:#ff006e;text-shadow:0 0 6px #ff006e;}
.hud-score{font-size:clamp(0.85rem,4vw,1.3rem);color:#ffbe0b;text-shadow:0 0 12px #ffbe0b;}
.hud-best{font-size:clamp(0.32rem,1.5vw,0.46rem);color:#4a4a6a;text-align:right;}
#tap-btn{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:86%;max-width:420px;padding:20px;background:rgba(255,0,110,0.12);border:2px solid rgba(255,0,110,0.5);color:#ff006e;font-family:'Press Start 2P',monospace;font-size:clamp(0.7rem,3vw,0.95rem);border-radius:14px;cursor:pointer;text-shadow:0 0 8px #ff006e;touch-action:manipulation;user-select:none;-webkit-user-select:none;z-index:500;}
#tap-btn:active{background:rgba(255,0,110,0.3);transform:translateX(-50%) scale(0.96);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:600;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;backdrop-filter:blur(5px);}
.overlay.show{display:flex;}
.overlay h2{font-family:'Orbitron',monospace;font-size:clamp(1rem,4.5vw,1.8rem);color:#ff006e;text-shadow:0 0 20px #ff006e;text-align:center;}
.score-big{font-size:clamp(1.2rem,6vw,2rem);color:#ffbe0b;text-shadow:0 0 16px #ffbe0b;}
.new-record{font-size:clamp(0.38rem,1.8vw,0.52rem);color:#00ff88;text-shadow:0 0 10px #00ff88;animation:glow2 1s infinite;}
@keyframes glow2{0%,100%{opacity:1}50%{opacity:0.6}}
.breakdown{font-size:clamp(0.28rem,1.4vw,0.38rem);color:#4a4a6a;text-align:center;line-height:2.4;background:rgba(255,255,255,0.03);border-radius:4px;padding:12px 16px;border:1px solid rgba(255,255,255,0.06);width:100%;max-width:300px;}
.breakdown span{color:#ffbe0b;}
.go-lb{width:100%;max-width:340px;background:rgba(255,0,110,0.05);border:1px solid rgba(255,0,110,0.15);border-radius:5px;padding:12px;}
.go-lb h4{font-size:clamp(0.32rem,1.6vw,0.44rem);color:#ffbe0b;text-align:center;margin-bottom:10px;}
.ov-btn{background:transparent;border:2px solid #ff006e;color:#ff006e;font-family:'Press Start 2P',monospace;font-size:clamp(0.5rem,2.2vw,0.68rem);padding:14px 22px;cursor:pointer;letter-spacing:0.12em;text-shadow:0 0 8px #ff006e;border-radius:4px;width:100%;max-width:300px;animation:glow 2s infinite;}
.ov-btn:active{background:rgba(255,0,110,0.2);}
.ov-btn.green{border-color:#00ff88;color:#00ff88;text-shadow:0 0 8px #00ff88;}
.name-input{background:rgba(255,0,110,0.08);border:1px solid rgba(255,0,110,0.4);color:#ff006e;font-family:'Press Start 2P',monospace;font-size:clamp(0.45rem,2vw,0.62rem);padding:13px 16px;border-radius:3px;text-align:center;width:100%;max-width:280px;letter-spacing:0.1em;outline:none;}
.name-input::placeholder{color:#4a4a6a;}
.name-input:focus{border-color:rgba(255,0,110,0.8);}
</style>
</head>
<body>

<div id="menu">
  <h1><span class="t1">FLAPPY</span> <span class="t2">PARS</span></h1>
  <div class="pars-big">🐆</div>
  <button class="start-btn" id="start-btn">▶ OYNA</button>
  <div class="menu-lb">
    <h3>🏆 LİDERLİK TABLOSU</h3>
    <div id="lb-menu"><div class="lb-empty">Yükleniyor...</div></div>
  </div>
  <div style="font-size:clamp(0.25rem,1.2vw,0.35rem);color:#4a4a6a;text-align:center;line-height:2.2;">
    🪙 Altın = 5 × Seviye &nbsp;|&nbsp; Boru = 10 × Seviye
  </div>
</div>

<div id="game"><canvas id="game-canvas"></canvas></div>

<div id="hud">
  <div class="hud-left">
    <div class="hud-coins" id="hud-coins">🪙 0</div>
    <div class="hud-level" id="hud-level">SEVİYE 1</div>
  </div>
  <div><div class="hud-score" id="hud-score">0</div></div>
  <div><div class="hud-best" id="hud-best">EN İYİ: 0</div></div>
</div>

<button id="tap-btn">🐆 ZIPLA!</button>

<div class="overlay" id="ov-go">
  <h2>OYUN BİTTİ</h2>
  <div class="score-big" id="go-score">0</div>
  <div class="new-record" id="go-rec" style="display:none;">★ YENİ REKOR! ★</div>
  <div class="breakdown" id="go-bd"></div>
  <div class="go-lb"><h4>🏆 LİDERLİK</h4><div id="lb-go"></div></div>
  <button class="ov-btn" id="btn-restart">▶ TEKRAR</button>
  <button class="ov-btn green" id="btn-menu">ANA MENÜ</button>
</div>

<div class="overlay" id="ov-name">
  <h2>🏆 YENİ REKOR!</h2>
  <div class="score-big" id="name-sc">0</div>
  <p style="font-size:clamp(0.32rem,1.5vw,0.45rem);color:#4a4a6a;">İsmin nedir?</p>
  <input class="name-input" id="name-inp" maxlength="10" placeholder="İSMİNİ YAZ" autocomplete="off"/>
  <button class="ov-btn" id="btn-save">KAYDET ▶</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBLwHbX1MwJEzyJ71GRtLkcChkgatFAgS0",
  authDomain:"flappy-pars.firebaseapp.com",
  databaseURL:"https://flappy-pars-default-rtdb.firebaseio.com",
  projectId:"flappy-pars",
  storageBucket:"flappy-pars.firebasestorage.app",
  messagingSenderId:"995587188702",
  appId:"1:995587188702:web:e0042cb45d617b47ef9f4f"
});

const db = firebase.database();
const REF = db.ref('flappy_pars_scores');
let LB = [];

REF.orderByChild('score').limitToLast(10).on('value', snap => {
  LB = [];
  snap.forEach(c => LB.push(c.val()));
  LB.sort((a,b) => b.score - a.score);
  renderLB('lb-menu', LB, 10);
});

function saveSc(name, score) {
  REF.push({ name: name.toUpperCase().slice(0,10), score, date: Date.now() });
}

function renderLB(id, data, max) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!data.length) { el.innerHTML='<div class="lb-empty">Henüz skor yok</div>'; return; }
  const M=['🥇','🥈','🥉'], C=['g','s','b'];
  el.innerHTML = data.slice(0,max).map((r,i)=>`
    <div class="lb-row">
      <span class="lb-rank ${C[i]||''}">${M[i]||i+1}</span>
      <span class="lb-name">${r.name}</span>
      <span class="lb-score">${r.score}</span>
    </div>`).join('');
}

const CV = document.getElementById('game-canvas');
const CX = CV.getContext('2d');

function W(){ return window.innerWidth; }
function H(){ return window.innerHeight; }
function resize(){ CV.width=W(); CV.height=H(); }

// ── SABİTLER ──
// Boru genişliği sabit piksel — çok dar olmayacak
const PIPE_W = 60;
// Pars boyutu — ekrana göre ama makul
function BIRD_SIZE(){ return Math.min(W(), H()) * 0.09; }
// Altın boyutu
function COIN_R(){ return Math.min(W(), H()) * 0.022; }
// Zemin yüksekliği
function GH(){ return Math.max(40, H() * 0.07); }
// Başlangıç boşluğu çok geniş
const GA_S = 280, GA_M = 130;
const MAX_LV = 20;
const PIPE_V = 10, COIN_V = 5;
const GR_S=0.13, GR_M=0.38;
const JP_S=-4.8, JP_M=-7.2;
const SP_S=1.1, SP_M=3.5;

let bird, pipes, coins, parts;
let score, coins_n, lv, sp, ga, gr, jp;
let run, aid, frm;
let lscore, lcoins, lpipes;
let best = parseInt(localStorage.getItem('fp6')||'0');

const STARS = Array.from({length:120},()=>({
  x:Math.random()*3000, y:Math.random()*3000,
  r:Math.random()*1.8+0.4, a:Math.random(), da:0.003+Math.random()*0.01
}));

function lvv(s,m,l){ return s+(m-s)*Math.min((l-1)/(MAX_LV-1),1); }
function applyLv(){ sp=lvv(SP_S,SP_M,lv); ga=lvv(GA_S,GA_M,lv); gr=lvv(GR_S,GR_M,lv); jp=lvv(JP_S,JP_M,lv); }

function initBird(){ bird={x:W()*0.2, y:H()*0.45, vy:0, alive:true}; }

function addPipe(){
  const gh=GH();
  // Borunun üst kısmı — zemin ve tavan boşluğu bırak
  const minTop = gh + 30;
  const maxTop = H() - ga - gh - 30;
  const topH = minTop + Math.random() * Math.max(10, maxTop - minTop);
  pipes.push({ x:W()+PIPE_W, topH, passed:false });
  const mid = topH + ga/2;
  const sp2 = W() * 0.15;
  for(let i=0;i<3;i++){
    coins.push({
      x: W()+PIPE_W+20+sp2*i+Math.random()*18,
      y: mid+(Math.random()-0.5)*ga*0.45,
      ok:false, a:Math.random()*Math.PI*2
    });
  }
}

function fx(x,y,col){
  for(let i=0;i<12;i++){
    const ang=(Math.PI*2/12)*i, s=2+Math.random()*4;
    parts.push({x,y,vx:Math.cos(ang)*s,vy:Math.sin(ang)*s-1.5,life:1,decay:0.045+Math.random()*0.03,col,sz:2.5+Math.random()*4});
  }
}

function drawBg(){
  const g=CX.createLinearGradient(0,0,0,H());
  g.addColorStop(0,'#080318'); g.addColorStop(0.65,'#0c1028'); g.addColorStop(1,'#091520');
  CX.fillStyle=g; CX.fillRect(0,0,W(),H());
  STARS.forEach(s=>{
    s.a+=s.da; if(s.a>1||s.a<0) s.da*=-1;
    CX.globalAlpha=s.a*0.75; CX.fillStyle='#fff';
    CX.beginPath(); CX.arc(s.x%W(),s.y%H(),s.r,0,Math.PI*2); CX.fill();
  });
  CX.globalAlpha=1;
}

function drawGround(){
  const gh=GH();
  CX.fillStyle='#091a09'; CX.fillRect(0,H()-gh,W(),gh);
  CX.strokeStyle='#00ff88'; CX.lineWidth=2.5;
  CX.beginPath(); CX.moveTo(0,H()-gh); CX.lineTo(W(),H()-gh); CX.stroke();
  CX.strokeStyle='rgba(0,255,136,0.1)'; CX.lineWidth=1;
  const step=50;
  for(let x=(frm*sp)%step;x<W();x+=step){
    CX.beginPath(); CX.moveTo(x,H()-gh); CX.lineTo(x+step/2,H()); CX.stroke();
  }
}

function drawPipes(){
  pipes.forEach(p=>{
    const g2=CX.createLinearGradient(p.x,0,p.x+PIPE_W,0);
    g2.addColorStop(0,'#004d1a'); g2.addColorStop(0.5,'#00cc44'); g2.addColorStop(1,'#002e10');
    CX.shadowColor='#00ff55'; CX.shadowBlur=14;
    CX.fillStyle=g2;
    const cap=10;
    // Üst boru — sadece topH kadar uzun
    CX.fillRect(p.x, 0, PIPE_W, p.topH);
    CX.fillRect(p.x-cap, p.topH-cap*2.5, PIPE_W+cap*2, cap*2.5);
    // Alt boru
    const by=p.topH+ga;
    const gh=GH();
    CX.fillRect(p.x, by, PIPE_W, H()-by-gh);
    CX.fillRect(p.x-cap, by, PIPE_W+cap*2, cap*2.5);
    CX.shadowBlur=0;
  });
}

function drawCoins(){
  const cr=COIN_R();
  coins.forEach(c=>{
    if(c.ok) return;
    c.a+=0.09;
    const w=Math.sin(c.a)*3;
    CX.shadowColor='#ffbe0b'; CX.shadowBlur=18;
    CX.fillStyle='#ffbe0b';
    CX.beginPath(); CX.arc(c.x,c.y+w,cr,0,Math.PI*2); CX.fill();
    CX.shadowBlur=0;
    CX.fillStyle='#ffe566';
    CX.beginPath(); CX.arc(c.x-cr*0.3,c.y+w-cr*0.3,cr*0.35,0,Math.PI*2); CX.fill();
    CX.fillStyle='#cc8800';
    CX.font=`bold ${cr*1.1}px serif`;
    CX.textAlign='center'; CX.textBaseline='middle';
    CX.fillText('₺',c.x,c.y+w+1);
  });
}

function drawParts(){
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=p.decay;
    CX.globalAlpha=Math.max(0,p.life);
    CX.shadowColor=p.col; CX.shadowBlur=7; CX.fillStyle=p.col;
    CX.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  });
  CX.globalAlpha=1; CX.shadowBlur=0;
}

function drawBird(){
  const sz=BIRD_SIZE();
  CX.save();
  CX.translate(bird.x, bird.y);
  CX.rotate(Math.max(-0.5, Math.min(Math.PI/2, bird.vy*0.065)));
  CX.shadowColor='#ffbe0b'; CX.shadowBlur=28;
  CX.font=`${sz*2}px serif`;
  CX.textAlign='center'; CX.textBaseline='middle';
  CX.fillText('🐆',0,0);
  CX.shadowBlur=0; CX.restore();
}

function update(){
  if(!bird.alive) return;
  frm++;
  bird.vy+=gr; bird.y+=bird.vy;
  const gh=GH();
  const br=BIRD_SIZE()*0.7;
  const cr=COIN_R();

  if(bird.y+br>=H()-gh || bird.y-br<=0){die();return;}

  for(let i=pipes.length-1;i>=0;i--){
    pipes[i].x-=sp;
    if(!pipes[i].passed && pipes[i].x+PIPE_W<bird.x){
      pipes[i].passed=true;
      score+=PIPE_V*lv;
      const pc=pipes.filter(p=>p.passed).length;
      if(pc>0&&pc%5===0){
        lv=Math.min(lv+1,MAX_LV);
        applyLv();
      }
      updHUD();
    }
    const cap=10;
    if(bird.x+br>pipes[i].x-cap && bird.x-br<pipes[i].x+PIPE_W+cap){
      if(bird.y-br<pipes[i].topH || bird.y+br>pipes[i].topH+ga){die();return;}
    }
    if(pipes[i].x+PIPE_W<-10) pipes.splice(i,1);
  }

  for(let i=coins.length-1;i>=0;i--){
    coins[i].x-=sp;
    if(!coins[i].ok){
      const dx=bird.x-coins[i].x, dy=bird.y-coins[i].y;
      if(Math.sqrt(dx*dx+dy*dy)<br+cr){
        coins[i].ok=true; coins_n++;
        score+=COIN_V*lv;
        fx(coins[i].x,coins[i].y,'#ffbe0b');
        updHUD();
      }
    }
    if(coins[i].x<-20) coins.splice(i,1);
  }

  const rate=Math.max(44,135-lv*4);
  if(frm%rate===0) addPipe();
}

function updHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-coins').textContent=`🪙 ${coins_n}`;
  document.getElementById('hud-level').textContent=`SEVİYE ${lv}`;
  document.getElementById('hud-best').textContent=`EN İYİ: ${best}`;
}

function loop(){
  update();
  drawBg(); drawPipes(); drawCoins(); drawParts(); drawGround(); drawBird();
  if(run) aid=requestAnimationFrame(loop);
}

function die(){
  bird.alive=false; run=false; cancelAnimationFrame(aid);
  lscore=score; lcoins=coins_n; lpipes=pipes.filter(p=>p.passed).length;
  if(score>best){ best=score; localStorage.setItem('fp6',best); }
  hideHUD();
  const isTop=LB.length<10||score>(LB[LB.length-1]?.score||0);
  if(score>0&&isTop){
    document.getElementById('name-sc').textContent=score;
    document.getElementById('ov-name').classList.add('show');
  } else showGO();
}

function showGO(){
  document.getElementById('go-score').textContent=lscore;
  document.getElementById('go-rec').style.display=lscore>=best&&lscore>0?'block':'none';
  document.getElementById('go-bd').innerHTML=
    `Boru: <span>${lpipes}×${PIPE_V}</span> &nbsp; Altın: <span>${lcoins}×${COIN_V}</span><br>`+
    `Seviye: <span>${lv}</span> &nbsp; Toplam: <span>${lscore}</span>`;
  renderLB('lb-go',LB,5);
  document.getElementById('ov-go').classList.add('show');
}

function showGame(){
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('hud').style.display='flex';
  if('ontouchstart'in window) document.getElementById('tap-btn').style.display='block';
}

function hideHUD(){
  document.getElementById('hud').style.display='none';
  document.getElementById('tap-btn').style.display='none';
}

function showMenu(){
  document.getElementById('ov-go').classList.remove('show');
  document.getElementById('ov-name').classList.remove('show');
  document.getElementById('game').style.display='none';
  hideHUD();
  document.getElementById('menu').style.display='flex';
  renderLB('lb-menu',LB,10);
}

function startGame(){
  resize(); initBird();
  pipes=[]; coins=[]; parts=[];
  score=0; coins_n=0; lv=1; frm=0;
  applyLv(); run=true;
  document.getElementById('ov-go').classList.remove('show');
  document.getElementById('ov-name').classList.remove('show');
  showGame(); updHUD(); addPipe();
  if(aid) cancelAnimationFrame(aid);
  aid=requestAnimationFrame(loop);
}

function jump(){ if(run) bird.vy=jp; }

document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();jump();} });
CV.addEventListener('click',jump);
CV.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
document.getElementById('tap-btn').addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
document.getElementById('tap-btn').addEventListener('click',jump);
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('btn-restart').addEventListener('click',startGame);
document.getElementById('btn-menu').addEventListener('click',showMenu);
document.getElementById('btn-save').addEventListener('click',saveN);
document.getElementById('name-inp').addEventListener('keydown',e=>{if(e.key==='Enter')saveN();});

function saveN(){
  const n=document.getElementById('name-inp').value.trim();
  if(!n){document.getElementById('name-inp').focus();return;}
  saveSc(n,lscore);
  document.getElementById('name-inp').value='';
  document.getElementById('ov-name').classList.remove('show');
  showGO();
}

window.addEventListener('resize',()=>{ if(run) resize(); });
</script>
