const kostumler=[
  {id:'normal',isim:'Normal',emoji:'🐆',renk:'#e8921a',ikinci:'#fce8c0'},
  {id:'ninja',isim:'Ninja',emoji:'🥷',renk:'#1a1a2e',ikinci:'#e94560'},

// Kostüm seçim ekranı
function kostumEkraniOlustur(){
  const grid=document.getElementById('kostum-grid');

  kostumler.forEach((k,i)=>{

    div.addEventListener('click',()=>{

      document.getElementById('giris-pars').textContent=k.emoji;

    grid.appendChild(div);
  });
}

// Oyun değişkenleri
let pars,borular,skor,enYuksek=0,aktif=false,raf,ilkZiplama=false;
let oyuncuIsim='';

const BGENISLIK=Math.floor(W*0.15);
const ARALIK=Math.floor(H*0.30);
const PARSBOY=Math.floor(W*0.09);
const PARSX=W*0.25;
const YER_YAVASH=0.06;
const YER_NORMAL=0.28;
const ZIPLAMA=-H*0.008;

// MÜZİK - Eğlenceli/Sevimli
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null,muzikAktif=false,melodiTimeout=null,melodiIdx=0;

const melodi=[
  [523,120],[659,120],[784,120],[659,120],
  [523,120],[440,120],[523,240],
  [698,120],[784,120],[880,120],[784,120],
  [698,120],[659,120],[698,240],
  [784,120],[880,120],[1047,120],[880,120],
  [784,120],[698,120],[784,240],
  [659,120],[784,120],[659,120],[523,120],
  [440,120],[392,120],[440,240],
  [523,120],[587,120],[659,120],[698,120],
  [784,120],[880,120],[1047,240],
  [880,120],[784,120],[698,120],[659,120],
  [587,120],[523,120],[440,240],
  [392,120],[440,120],[523,120],[587,120],
  [659,120],[698,120],[784,240],
  [523,120],[440,120],[392,120],[349,240],
];

function notaCal(frekans,sure){
  if(!audioCtx||!muzikAktif)return;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const osc2=audioCtx.createOscillator();
  const gain2=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc2.connect(gain2);gain2.connect(audioCtx.destination);
  osc.frequency.value=frekans;osc.type='triangle';
  osc2.frequency.value=frekans*1.5;osc2.type='sine';
  gain.gain.setValueAtTime(0.1,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+sure/1000*0.8);
  gain2.gain.setValueAtTime(0.03,audioCtx.currentTime);
  gain2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+sure/1000*0.5);
  osc.start();osc.stop(audioCtx.currentTime+sure/1000);
  osc2.start();osc2.stop(audioCtx.currentTime+sure/1000);
}

function muzikDongusu(){
  if(!muzikAktif)return;
  const[frekans,sure]=melodi[melodiIdx%melodi.length];
  notaCal(frekans,sure);
  melodiIdx++;
  melodiTimeout=setTimeout(muzikDongusu,sure+15);
}

document.getElementById('muzik-btn').addEventListener('click',()=>{
  if(!audioCtx)audioCtx=new AudioCtx();
  muzikAktif=!muzikAktif;
  document.getElementById('muzik-btn').textContent=muzikAktif?'🔊':'🔇';
  if(muzikAktif){melodiIdx=0;muzikDongusu();}
  else if(melodiTimeout)clearTimeout(melodiTimeout);
});

// LİDERLİK - Tüm skorları çek
function liderlikYukle(){
  const liste=document.getElementById('lider-liste');
  liste.innerHTML='<div style="color:#666;text-align:center;padding:20px">⏳ Yükleniyor...</div>';
  db.ref('skorlar').once('value').then(snap=>{
    if(!snap.exists()){
      liste.innerHTML='<div style="color:#aaa;text-align:center;padding:20px">Henüz skor yok!<br>İlk sen ol! 🏆</div>';
      return;
    }
    const skorlar=[];
    snap.forEach(c=>{
      const v=c.val();
      if(v&&v.isim&&v.skor!==undefined)skorlar.push(v);
    });
    skorlar.sort((a,b)=>b.skor-a.skor);
    const top10=skorlar.slice(0,10);
    const siraflar=['🥇','🥈','🥉'];
    const siniflar=['altin','gumus','bronz'];
    liste.innerHTML=top10.map((s,i)=>`
      <div class="lider-item ${siniflar[i]||''}">
        <div class="lider-sira">${siraflar[i]||'<span style="font-size:14px;color:#aaa">#'+(i+1)+'</span>'}</div>
        <div class="lider-isim">${s.isim}</div>
        <div class="lider-skor">${s.skor}</div>
      </div>
    `).join('');
  }).catch(e=>{
    console.error(e);
    liste.innerHTML='<div style="color:#f66;text-align:center;padding:20px">Bağlantı hatası!<br>'+e.message+'</div>';
  });
}

function skorKaydet(isim,yeniSkor){
  if(!isim)return Promise.resolve(false);
  const key=isim.replace(/[.#$\[\]/\s]/g,'_').substring(0,20);
  return db.ref('skorlar/'+key).once('value').then(snap=>{
    if(!snap.exists()||snap.val().skor<yeniSkor){
      return db.ref('skorlar/'+key).set({isim:isim,skor:yeniSkor,tarih:Date.now()}).then(()=>true);
    }
    return false;
  }).catch(()=>false);
}

// PARS ÇİZ
function parsCiz(x,y,vy){
  const s=PARSBOY;
  const k=seciliKostum;
  const aci=Math.min(Math.max(vy*1.5,-20),35)*Math.PI/180;
  ctx.save();ctx.translate(x,y);ctx.rotate(aci);
  ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;

  if(k.id==='normal'||k.id==='ninja'||k.id==='kral'||k.id==='ates'||k.id==='kar'||k.id==='uzayli'){
    // Vücut
    ctx.beginPath();ctx.ellipse(0,0,s*.7,s*.42,0,0,Math.PI*2);
    const vG=ctx.createRadialGradient(-s*.1,-s*.1,s*.1,0,0,s*.7);
    vG.addColorStop(0,k.ikinci);vG.addColorStop(0.5,k.renk);vG.addColorStop(1,k.id==='kar'?'#8ab8cc':k.renk);
    ctx.fillStyle=vG;ctx.fill();

    // Karın
    ctx.beginPath();ctx.ellipse(s*.05,s*.1,s*.32,s*.25,0.1,0,Math.PI*2);
    ctx.fillStyle=k.id==='uzayli'?'#00ffaa':k.id==='kar'?'white':k.id==='ninja'?'#333':'#fce8c0';
    ctx.fill();

    // Benekler (Normal ve Kral için)
    if(k.id==='normal'||k.id==='kral'){
      ctx.fillStyle='rgba(139,69,19,0.7)';
      [[-s*.3,-s*.15,s*.07],[-s*.1,-s*.2,s*.065],[s*.15,-s*.18,s*.07],[s*.35,-s*.1,s*.055],[-s*.25,s*.05,s*.065],[0,s*.05,s*.07],[s*.25,s*.08,s*.055]].forEach(([bx,by,br])=>{
        ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
      });
    }

    // Ateş efekti
    if(k.id==='ates'){
      ctx.fillStyle='rgba(255,200,0,0.6)';
      [[-s*.3,-s*.2,s*.08],[-s*.1,-s*.25,s*.07],[s*.15,-s*.22,s*.08],[s*.35,-s*.15,s*.06]].forEach(([bx,by,br])=>{
        ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
      });
    }

    // Kar efekti
    if(k.id==='kar'){
      ctx.fillStyle='rgba(180,220,255,0.8)';
      [[-s*.25,-s*.1,s*.06],[s*.1,-s*.2,s*.05],[s*.3,-s*.05,s*.06],[-s*.1,s*.05,s*.05]].forEach(([bx,by,br])=>{
        ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
      });
    }

    // Bacaklar
    ctx.strokeStyle=k.id==='kar'?'#8ab8cc':k.id==='ninja'?'#111':k.renk;
    ctx.lineWidth=s*.11;ctx.lineCap='round';
    [[s*.2,s*.2,s*.3,s*.42],[s*.05,s*.25,s*.1,s*.48],[-s*.35,s*.2,-s*.45,s*.42],[-s*.2,s*.25,-s*.25,s*.45]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    });

    // Kuyruk
    ctx.beginPath();ctx.moveTo(-s*.65,s*.05);ctx.bezierCurveTo(-s*.9,s*.1,-s*.95,-s*.2,-s*.75,-s*.3);
    ctx.strokeStyle=k.id==='ates'?'#ff6600':k.id==='kar'?'#aad4f5':k.renk;
    ctx.lineWidth=s*.09;ctx.stroke();

    // Baş
    ctx.shadowBlur=0;
    const hy=vy<-1?-s*.38:-s*.18;
    ctx.beginPath();ctx.arc(s*.6,hy,s*.36,0,Math.PI*2);
    const bG=ctx.createRadialGradient(s*.5,hy-s*.05,s*.05,s*.6,hy,s*.36);
    bG.addColorStop(0,k.ikinci);bG.addColorStop(0.6,k.renk);bG.addColorStop(1,k.id==='kar'?'#8ab8cc':k.renk);
    ctx.fillStyle=bG;ctx.fill();

    // Yüz
    ctx.beginPath();ctx.ellipse(s*.65,hy+s*.05,s*.18,s*.23,0,0,Math.PI*2);
    ctx.fillStyle=k.id==='uzayli'?'#00ffaa':k.id==='kar'?'white':k.id==='ninja'?'#333':'#fce8c0';
    ctx.fill();

    // Kulaklar
    ctx.fillStyle=k.renk;
    ctx.beginPath();ctx.moveTo(s*.45,hy-s*.26);ctx.lineTo(s*.3,hy-s*.48);ctx.lineTo(s*.58,hy-s*.33);ctx.fill();
    ctx.beginPath();ctx.moveTo(s*.7,hy-s*.26);ctx.lineTo(s*.85,hy-s*.48);ctx.lineTo(s*.75,hy-s*.2);ctx.fill();

    // Kral tacı
    if(k.id==='kral'){
      ctx.fillStyle='#ffd700';
      ctx.beginPath();ctx.moveTo(s*.35,hy-s*.35);ctx.lineTo(s*.4,hy-s*.55);ctx.lineTo(s*.5,hy-s*.42);ctx.lineTo(s*.6,hy-s*.58);ctx.lineTo(s*.7,hy-s*.42);ctx.lineTo(s*.8,hy-s*.55);ctx.lineTo(s*.85,hy-s*.35);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(s*.6,hy-s*.52,s*.04,0,Math.PI*2);ctx.fill();
    }

    // Ninja bandanası
    if(k.id==='ninja'){
      ctx.fillStyle='#cc0000';
      ctx.fillRect(s*.3,hy-s*.15,s*.6,s*.08);
      ctx.beginPath();ctx.moveTo(s*.9,hy-s*.12);ctx.lineTo(s*1.05,hy-s*.05);ctx.lineTo(s*.9,hy+s*.02);ctx.fill();
    }

    // Uzaylı anten
    if(k.id==='uzayli'){
      ctx.strokeStyle='#00ff88';ctx.lineWidth=s*.04;
      ctx.beginPath();ctx.moveTo(s*.6,hy-s*.36);ctx.lineTo(s*.6,hy-s*.55);ctx.stroke();
      ctx.fillStyle='#00ff88';ctx.beginPath();ctx.arc(s*.6,hy-s*.58,s*.05,0,Math.PI*2);ctx.fill();
    }

    // Ateş alevi başın üstünde
    if(k.id==='ates'){
      ctx.font=(s*.4)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🔥',s*.6,hy-s*.45);
    }

    // Kar şapkası
    if(k.id==='kar'){
      ctx.fillStyle='#cc0000';
      ctx.beginPath();ctx.ellipse(s*.6,hy-s*.32,s*.3,s*.07,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='white';
      ctx.beginPath();ctx.moveTo(s*.3,hy-s*.32);ctx.lineTo(s*.6,hy-s*.65);ctx.lineTo(s*.9,hy-s*.32);ctx.fill();
      ctx.fillStyle='white';ctx.beginPath();ctx.arc(s*.6,hy-s*.65,s*.06,0,Math.PI*2);ctx.fill();
    }

    // Gözler
    const gozRenk=k.id==='uzayli'?'#00ff44':k.id==='ates'?'#ff4400':'#111';
    [[s*.54,hy-s*.1],[s*.71,hy-s*.1]].forEach(([ex,ey])=>{
      ctx.beginPath();ctx.arc(ex,ey,s*.09,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
      ctx.beginPath();ctx.arc(ex+s*.01,ey,s*.055,0,Math.PI*2);ctx.fillStyle=gozRenk;ctx.fill();
      ctx.beginPath();ctx.arc(ex+s*.02,ey-s*.03,s*.022,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
    });

    // Burun
    ctx.beginPath();ctx.arc(s*.77,hy+s*.06,s*.052,0,Math.PI*2);
    ctx.fillStyle=k.id==='uzayli'?'#00ff44':k.id==='kar'?'#ff6600':'#ff6b6b';ctx.fill();

    // Ağız
    ctx.beginPath();ctx.moveTo(s*.67,hy+s*.11);ctx.quadraticCurveTo(s*.77,hy+s*.18,s*.87,hy+s*.11);
    ctx.strokeStyle=k.id==='kar'?'#336699':'#8b4513';ctx.lineWidth=s*.036;ctx.lineCap='round';ctx.stroke();
  }
  ctx.restore();
}

// AĞAÇ ÇİZ
function agacCiz(x,y1,y2,ust,hareketY){
  const ay1=ust?y1:y1+hareketY,ay2=ust?y2+hareketY:y2;
  const gG=Math.floor(BGENISLIK*.28),gX=x+BGENISLIK/2-gG/2;
  const gGrad=ctx.createLinearGradient(gX,0,gX+gG,0);
  gGrad.addColorStop(0,'#2a1200');gGrad.addColorStop(0.35,'#5c2e00');gGrad.addColorStop(0.65,'#7a3e0a');gGrad.addColorStop(1,'#2a1200');
  ctx.fillStyle=gGrad;
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(gX,ust?0:ay1,gG,ust?ay2:H-ay1,3);
  else ctx.rect(gX,ust?0:ay1,gG,ust?ay2:H-ay1);
  ctx.fill();
  const yapY=ust?ay2:ay1;
  for(let k=0;k<3;k++){
    const yOf=(ust?-1:1)*(k*20+18),gen=BGENISLIK*(1.15-k*.12);
    for(let i=0;i<7;i++){
      const a=(i/7)*Math.PI*2,lx=x+BGENISLIK/2+Math.cos(a)*gen*.38,ly=yapY+yOf+Math.sin(a)*gen*.22;
      ctx.beginPath();ctx.arc(lx,ly,gen*.2,0,Math.PI*2);
      ctx.fillStyle=`hsl(${108+k*8+i*2},${68+k*4}%,${22+k*4}%)`;ctx.fill();
    }
    ctx.beginPath();ctx.arc(x+BGENISLIK/2,yapY+yOf,gen*.28,0,Math.PI*2);
    ctx.fillStyle=`hsl(${118+k*6},72%,${26+k*3}%)`;ctx.fill();
  }
}

// OYUN
function oyunuBaslat(){
  goster('oyun-ui');
  pars={y:H/2,vy:0};
  borular=[];skor=0;aktif=true;ilkZiplama=false;
  document.getElementById('skor').textContent='0';
  document.getElementById('en-iyi-text').textContent='🏆 '+enYuksek;
  if(raf)cancelAnimationFrame(raf);
  loop();
}

function zipla(){if(!aktif)return;ilkZiplama=true;pars.vy=ZIPLAMA;}
canvas.addEventListener('click',zipla);
canvas.addEventListener('touchstart',e=>{e.preventDefault();zipla();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&aktif)zipla();});

let zaman=0;
function loop(){
  if(!aktif)return;
  zaman+=0.05;
  const hiz=Math.min(2+skor*.06,6.5);
  const yer=ilkZiplama?Math.min(YER_NORMAL+skor*.005,0.55):YER_YAVASH;
  pars.vy+=yer;pars.y+=pars.vy;

  if(borular.length===0||borular[borular.length-1].x<W-W*.6)boruEkle();
  for(let i=borular.length-1;i>=0;i--){
    borular[i].x-=hiz;
    if(!borular[i].gecildi&&borular[i].x+BGENISLIK<PARSX){
      borular[i].gecildi=true;skor++;
      document.getElementById('skor').textContent=skor;
    }
    if(borular[i].x+BGENISLIK<0)borular.splice(i,1);
  }

  // Çarpışma - hareketli engel hesabı
  if(pars.y-PARSBOY/2<0||pars.y+PARSBOY/2>H-15){oldu();return;}
  for(const b of borular){
    const hy=Math.sin(zaman+b.faz)*b.genlik;
    const gercekUst=b.ust+hy,gercekAlt=b.alt+hy;
    if(PARSX+PARSBOY/2-8>b.x&&PARSX-PARSBOY/2+8<b.x+BGENISLIK){
      if(pars.y-PARSBOY/2+8<gercekUst||pars.y+PARSBOY/2-8>gercekAlt){oldu();return;}
    }
  }
  ciz();raf=requestAnimationFrame(loop);
}

function boruEkle(){
  const min=H*.18,max=H-ARALIK-H*.18;
  const ust=Math.random()*(max-min)+min;
  const hareketliMi=skor>5&&Math.random()>0.4;
  borular.push({
    x:W+BGENISLIK,
    ust:ust,alt:ust+ARALIK,
    gecildi:false,
    hareketli:hareketliMi,
    genlik:hareketliMi?Math.random()*40+20:0,
    faz:Math.random()*Math.PI*2
  });
}

function ciz(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#061a0e');g.addColorStop(0.5,'#0d2b18');g.addColorStop(1,'#1a4a20');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  for(const b of borular){
    const hy=Math.sin(zaman+b.faz)*b.genlik;
    agacCiz(b.x,0,b.ust+hy,true,hy);
    agacCiz(b.x,b.alt+hy,H,false,hy);
  }

  const zG=ctx.createLinearGradient(0,H-25,0,H);
  zG.addColorStop(0,'#4acd20');zG.addColorStop(0.3,'#2d8a10');zG.addColorStop(1,'#1a5c0a');
  ctx.fillStyle=zG;ctx.fillRect(0,H-20,W,20);
  ctx.fillStyle='#5aee28';
  for(let i=0;i<W;i+=12){ctx.fillRect(i,H-23,3,5);ctx.fillRect(i+6,H-25,2,7);}

  parsCiz(PARSX,pars.y,pars.vy);
}

function oldu(){
  aktif=false;cancelAnimationFrame(raf);
  if(skor>enYuksek)enYuksek=skor;
  document.body.classList.remove('sarsin');void document.body.offsetWidth;document.body.classList.add('sarsin');
  ctx.fillStyle='rgba(255,0,0,0.2)';ctx.fillRect(0,0,W,H);
  document.getElementById('son-skor').textContent=skor;
  document.getElementById('oldu-en-iyi').textContent='🏆 En Yüksek: '+enYuksek;
  document.getElementById('kayit-mesaj').textContent='';
  setTimeout(()=>goster('oldu'),250);
  if(oyuncuIsim){
    skorKaydet(oyuncuIsim,skor).then(ok=>{
      document.getElementById('kayit-mesaj').textContent=ok?'✅ Skor kaydedildi!':'📊 Zaten daha yüksek skorun var!';
    });
  }
}
</script>
