<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Pars</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #07070f;
  font-family: 'Press Start 2P', monospace;
  min-height: 100vh;
  overflow: hidden;
  color: #d0d0ff;
}

/* Scanline */
body::before {
  content:''; position:fixed; inset:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  pointer-events:none; z-index:1000;
}

/* ── MENÜ ── */
#menu {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 16px;
  padding: 20px;
}

#menu h1 {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(1.2rem, 5vw, 2.5rem);
  letter-spacing: 0.2em;
  text-align: center;
  margin-bottom: 8px;
}

.t1 { color:#ffbe0b; text-shadow:0 0 15px #ffbe0b, 0 0 40px #ffbe0b; }
.t2 { color:#ff006e; text-shadow:0 0 15px #ff006e, 0 0 40px #ff006e; }

.pars-emoji {
  font-size: clamp(3rem, 10vw, 5rem);
  animation: bounce 1.2s ease-in-out infinite;
  filter: drop-shadow(0 0 16px rgba(255,190,11,0.8));
}

@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

.start-btn {
  background: transparent;
  border: 2px solid #ff006e;
  color: #ff006e;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.7rem;
  padding: 16px 32px;
  cursor: pointer;
  letter-spacing: 0.15em;
  text-shadow: 0 0 10px #ff006e;
  border-radius: 4px;
  animation: glow 2s infinite;
  width: 100%;
  max-width: 300px;
}

@keyframes glow {
  0%,100%{box-shadow:0 0 10px rgba(255,0,110,0.3)}
  50%{box-shadow:0 0 30px rgba(255,0,110,0.7)}
}

.start-btn:active { background: rgba(255,0,110,0.2); transform: scale(0.97); }

/* Menü liderlik */
.menu-lb {
  width: 100%;
  max-width: 360px;
  background: rgba(255,0,110,0.06);
  border: 1px solid rgba(255,0,110,0.2);
  border-radius: 6px;
  padding: 14px;
}

.menu-lb h3 {
  font-size: 0.5rem;
  color: #ffbe0b;
  text-shadow: 0 0 8px #ffbe0b;
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 0.1em;
}

.lb-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 8px;
  margin-bottom: 4px;
  background: rgba(255,255,255,0.03);
  border-radius: 3px;
  gap: 6px;
}

.lb-rank { font-size:0.34rem; min-width:24px; color:#4a4a6a; }
.lb-rank.g { color:#ffbe0b; text-shadow:0 0 6px #ffbe0b; }
.lb-rank.s { color:#aaaacc; }
.lb-rank.b { color:#cc8844; }
.lb-name { font-size:0.34rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#d0d0ff; }
.lb-score { font-size:0.34rem; color:#ff006e; text-shadow:0 0 4px #ff006e; }
.lb-empty { font-size:0.3rem; color:#4a4a6a; text-align:center; padding:8px; }

/* ── OYUN ── */
#game { display:none; position:fixed; inset:0; }

#game-canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  image-rendering: pixelated;
}

/* HUD - Sol üst */
#hud {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 10px 16px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(255,0,110,0.2);
  z-index: 500;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
}

.hud-left { display:flex; flex-direction:column; gap:4px; }
.hud-center { text-align:center; }
.hud-right { text-align:right; }

.hud-score {
  font-size: clamp(0.7rem, 3vw, 1.1rem);
  color: #ffbe0b;
  text-shadow: 0 0 10px #ffbe0b;
}

.hud-coins {
  font-size: clamp(0.45rem, 2vw, 0.6rem);
  color: #ffbe0b;
  text-shadow: 0 0 6px #ffbe0b;
}

.hud-level {
  font-size: clamp(0.45rem, 2vw, 0.6rem);
  color: #ff006e;
  text-shadow: 0 0 6px #ff006e;
  margin-top: 2px;
}

.hud-best {
  font-size: clamp(0.35rem, 1.5vw, 0.5rem);
  color: #4a4a6a;
}

/* Touch zıplama butonu */
#tap-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 88%;
  max-width: 400px;
  padding: 20px;
  background: rgba(255,0,110,0.12);
  border: 2px solid rgba(255,0,110,0.5);
  color: #ff006e;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.85rem;
  border-radius: 12px;
  cursor: pointer;
  text-shadow: 0 0 8px #ff006e;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  z-index: 500;
}

#tap-btn:active {
  background: rgba(255,0,110,0.3);
  transform: translateX(-50%) scale(0.96);
  box-shadow: 0 0 30px rgba(255,0,110,0.5);
}

/* ── OVERLAY ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 600;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.overlay.show { display:flex; }

.overlay h2 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1rem, 4vw, 1.6rem);
  color: #ff006e;
  text-shadow: 0 0 20px #ff006e;
  text-align: center;
}

.score-big {
  font-size: clamp(1rem, 5vw, 1.8rem);
  color: #ffbe0b;
  text-shadow: 0 0 16px #ffbe0b;
}

.new-record {
  font-size: 0.45rem;
  color: #00ff88;
  text-shadow: 0 0 10px #00ff88;
  animation: glow2 1s infinite;
}

@keyframes glow2 { 0%,100%{opacity:1} 50%{opacity:0.6} }

.breakdown {
  font-size: 0.32rem;
  color: #4a4a6a;
  text-align: center;
  line-height: 2.2;
  background: rgba(255,255,255,0.03);
  border-radius: 4px;
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.06);
  width: 100%;
  max-width: 280px;
}

.breakdown span { color: #ffbe0b; }

.go-lb {
  width: 100%;
  max-width: 300px;
  background: rgba(255,0,110,0.05);
  border: 1px solid rgba(255,0,110,0.15);
  border-radius: 4px;
  padding: 10px;
}

.go-lb h4 {
  font-size: 0.36rem;
  color: #ffbe0b;
  text-align: center;
  margin-bottom: 8px;
}

.ov-btn {
  background: transparent;
  border: 2px solid #ff006e;
  color: #ff006e;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  padding: 13px 20px;
  cursor: pointer;
  letter-spacing: 0.12em;
  text-shadow: 0 0 8px #ff006e;
  border-radius: 3px;
  width: 100%;
  max-width: 260px;
  animation: glow 2s infinite;
}

.ov-btn:active { background: rgba(255,0,110,0.2); }

.ov-btn.green {
  border-color: #00ff88;
  color: #00ff88;
  text-shadow: 0 0 8px #00ff88;
}

.name-input {
  background: rgba(255,0,110,0.08);
  border: 1px solid rgba(255,0,110,0.4);
  color: #ff006e;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  padding: 12px 14px;
  border-radius: 3px;
  text-align: center;
  width: 100%;
  max-width: 250px;
  letter-spacing: 0.1em;
  outline: none;
}

.name-input::placeholder { color: #4a4a6a; }
.name-input:focus { border-color: rgba(255,0,110,0.8); box-shadow: 0 0 12px rgba(255,0,110,0.3); }
</style>
</head>
<body>

<!-- ═══ MENÜ ═══ -->
<div id="menu">
  <h1><span class="t1">FLAPPY</span> <span class="t2">PARS</span></h1>
  <div class="pars-emoji">🐆</div>
  <button class="start-btn" id="start-btn">▶ OYNA</button>
  <div class="menu-lb">
    <h3>🏆 LİDERLİK TABLOSU</h3>
    <div id="lb-menu"><div class="lb-empty">Yükleniyor...</div></div>
  </div>
  <div style="font-size:0.28rem;color:#4a4a6a;text-align:center;line-height:2;">
    🪙 Altın = 5 × Seviye &nbsp;|&nbsp; Boru = 10 × Seviye
  </div>
</div>

<!-- ═══ OYUN ═══ -->
<div id="game">
  <canvas id="game-canvas"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-left">
    <div class="hud-coins" id="hud-coins">🪙 0</div>
    <div class="hud-level" id="hud-level">SEVİYE 1</div>
  </div>
  <div class="hud-center">
    <div class="hud-score" id="hud-score">0</div>
  </div>
  <div class="hud-right">
    <div class="hud-best" id="hud-best">EN İYİ: 0</div>
  </div>
</div>

<!-- Zıplama butonu -->
<button id="tap-btn">🐆 ZIPLA!</button>

<!-- ═══ OVERLAY: OYUN SONU ═══ -->
<div class="overlay" id="ov-gameover">
  <h2>OYUN BİTTİ</h2>
  <div class="score-big" id="go-score">0</div>
  <div class="new-record" id="go-record" style="display:none;">★ YENİ REKOR! ★</div>
  <div class="breakdown" id="go-breakdown"></div>
  <div class="go-lb">
    <h4>🏆 LİDERLİK</h4>
    <div id="lb-go"><div class="lb-empty">...</div></div>
  </div>
  <button class="ov-btn" id="btn-restart">▶ TEKRAR</button>
  <button class="ov-btn green" id="btn-menu">ANA MENÜ</button>
</div>

<!-- ═══ OVERLAY: İSİM ═══ -->
<div class="overlay" id="ov-name">
  <h2>🏆 YENİ REKOR!</h2>
  <div class="score-big" id="name-score">0</div>
  <p style="font-size:0.36rem;color:#4a4a6a;">İsmin nedir?</p>
  <input class="name-input" id="name-input" maxlength="10" placeholder="İSMİNİ YAZ" autocomplete="off"/>
  <button class="ov-btn" id="btn-name-save">KAYDET ▶</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ── Firebase ──────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyBLwHbX1MwJEzyJ71GRtLkcChkgatFAgS0",
  authDomain: "flappy-pars.firebaseapp.com",
  databaseURL: "https://flappy-pars-default-rtdb.firebaseio.com",
  projectId: "flappy-pars",
  storageBucket: "flappy-pars.firebasestorage.app",
  messagingSenderId: "995587188702",
  appId: "1:995587188702:web:e0042cb45d617b47ef9f4f"
});

const db = firebase.database();
const scoresRef = db.ref('flappy_pars_scores');
let leaderboard = [];

scoresRef.orderByChild('score').limitToLast(10).on('value', snap => {
  leaderboard = [];
  snap.forEach(c => leaderboard.push(c.val()));
  leaderboard.sort((a,b) => b.score - a.score);
  renderLB('lb-menu', leaderboard, 10);
});

function saveScore(name, score) {
  scoresRef.push({ name: name.toUpperCase().slice(0,10), score, date: Date.now() });
}

function renderLB(id, data, max) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!data.length) { el.innerHTML='<div class="lb-empty">Henüz skor yok</div>'; return; }
  const medals=['🥇','🥈','🥉'], cls=['g','s','b'];
  el.innerHTML = data.slice(0,max).map((r,i)=>`
    <div class="lb-row">
      <span class="lb-rank ${cls[i]||''}">${medals[i]||i+1}</span>
      <span class="lb-name">${r.name}</span>
      <span class="lb-score">${r.score}</span>
    </div>`).join('');
}

// ── Canvas ────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function W() { return window.innerWidth; }
function H() { return window.innerHeight; }

function resizeCanvas() {
  canvas.width  = W();
  canvas.height = H();
}

// ── Oyun sabitleri ────────────────────────
const MAX_LEVEL   = 20;
const PIPE_VAL    = 10;
const COIN_VAL    = 5;
const COIN_R      = Math.max(10, W() * 0.025);

// Başlangıç çok yavaş, ilerledikçe zorlaşır
const GR_START  = 0.12;   // Çok hafif yerçekimi
const GR_MAX    = 0.38;
const JP_START  = -4.2;   // Kısa zıplama
const JP_MAX    = -6.5;
const SP_START  = 1.0;    // Çok yavaş
const SP_MAX    = 3.5;
const GAP_START = 240;    // Çok geniş boşluk
const GAP_MIN   = 110;

// ── State ─────────────────────────────────
let bird, pipes, coins, particles;
let score, coinCount, level, speed, gap, grav, jumpF;
let running, animId, frame;
let lastScore, lastCoins, lastPipes;
let best = parseInt(localStorage.getItem('fp_best_v4')||'0');

const stars = Array.from({length:100}, () => ({
  x: Math.random()*2000, y: Math.random()*2000,
  r: Math.random()*1.5+0.3,
  a: Math.random(), da: 0.003+Math.random()*0.01
}));

function lv(start, max, lvl) {
  return start + (max-start) * Math.min((lvl-1)/(MAX_LEVEL-1), 1);
}

function applyLevel() {
  speed = lv(SP_START, SP_MAX, level);
  gap   = lv(GAP_START, GAP_MIN, level);
  grav  = lv(GR_START, GR_MAX, level);
  jumpF = lv(JP_START, JP_MAX, level);
}

// ── Bird ──────────────────────────────────
function initBird() {
  bird = { x: W()*0.22, y: H()*0.45, vy: 0, r: Math.max(16, W()*0.04), alive: true };
}

// ── Pipe ──────────────────────────────────
const PW = () => Math.max(48, W()*0.11);

function addPipe() {
  const pw = PW();
  const topH = 70 + Math.random() * (H() - gap - 180);
  pipes.push({ x: W()+pw, topH, passed: false });
  const mid = topH + gap/2;
  const sp  = W() * 0.17;
  for (let i=0; i<3; i++) {
    coins.push({
      x: W()+pw+24+sp*i+Math.random()*18,
      y: mid + (Math.random()-0.5)*gap*0.5,
      ok: false, a: Math.random()*Math.PI*2
    });
  }
}

// ── Particles ─────────────────────────────
function fx(x, y, color) {
  for (let i=0; i<12; i++) {
    const ang = (Math.PI*2/12)*i;
    const spd = 1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1,
      life:1, decay:0.05+Math.random()*0.03,
      color, size:2+Math.random()*4});
  }
}

// ── Draw ──────────────────────────────────
function drawBg() {
  const g = ctx.createLinearGradient(0,0,0,H());
  g.addColorStop(0,'#080318'); g.addColorStop(0.6,'#0c1028'); g.addColorStop(1,'#091520');
  ctx.fillStyle=g; ctx.fillRect(0,0,W(),H());
  stars.forEach(s => {
    s.a+=s.da; if(s.a>1||s.a<0) s.da*=-1;
    ctx.globalAlpha=s.a*0.7; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x%W(),s.y%H(),s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawGround() {
  const gh = Math.max(30, H()*0.055);
  ctx.fillStyle='#0a1e0a';
  ctx.fillRect(0,H()-gh,W(),gh);
  ctx.strokeStyle='#00ff88'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,H()-gh); ctx.lineTo(W(),H()-gh); ctx.stroke();
  ctx.strokeStyle='rgba(0,255,136,0.12)'; ctx.lineWidth=1;
  for (let x=(frame*speed)%44;x<W();x+=44) {
    ctx.beginPath(); ctx.moveTo(x,H()-gh); ctx.lineTo(x+22,H()); ctx.stroke();
  }
}

function GH() { return Math.max(30, H()*0.055); }

function drawPipes() {
  const pw = PW();
  pipes.forEach(p => {
    const g2 = ctx.createLinearGradient(p.x,0,p.x+pw,0);
    g2.addColorStop(0,'#004d1a'); g2.addColorStop(0.45,'#00aa44'); g2.addColorStop(1,'#002e10');
    ctx.shadowColor='#00ff66'; ctx.shadowBlur=10;
    ctx.fillStyle=g2;
    // Üst boru
    ctx.fillRect(p.x, 0, pw, p.topH);
    ctx.fillRect(p.x-6, p.topH-20, pw+12, 20);
    // Alt boru
    const by = p.topH+gap;
    ctx.fillRect(p.x, by, pw, H()-by-GH());
    ctx.fillRect(p.x-6, by, pw+12, 20);
    ctx.shadowBlur=0;
  });
}

function drawCoins() {
  coins.forEach(c => {
    if (c.ok) return;
    c.a+=0.08;
    const w = Math.sin(c.a)*3;
    ctx.shadowColor='#ffbe0b'; ctx.shadowBlur=16;
    ctx.fillStyle='#ffbe0b';
    ctx.beginPath(); ctx.arc(c.x,c.y+w,COIN_R,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffe566';
    ctx.beginPath(); ctx.arc(c.x-COIN_R*0.3,c.y+w-COIN_R*0.3,COIN_R*0.35,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#cc8800';
    ctx.font=`bold ${COIN_R}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('₺',c.x,c.y+w+1);
  });
}

function drawParticles() {
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=p.decay;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.shadowColor=p.color; ctx.shadowBlur=6; ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(Math.max(-0.5, Math.min(Math.PI/2, bird.vy*0.065)));
  ctx.shadowColor='#ffbe0b'; ctx.shadowBlur=24;
  const sz = Math.max(28, W()*0.075);
  ctx.font=`${sz}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🐆',0,0);
  ctx.shadowBlur=0; ctx.restore();
}

// ── Update ────────────────────────────────
function update() {
  if (!bird.alive) return;
  frame++;
  bird.vy += grav;
  bird.y  += bird.vy;

  const gh = GH();
  const pw = PW();

  if (bird.y+bird.r >= H()-gh || bird.y-bird.r <= 0) { die(); return; }

  // Borular
  for (let i=pipes.length-1; i>=0; i--) {
    pipes[i].x -= speed;
    if (!pipes[i].passed && pipes[i].x+pw < bird.x) {
      pipes[i].passed = true;
      score += PIPE_VAL * level;
      const passed = pipes.filter(p=>p.passed).length;
      if (passed > 0 && passed % 5 === 0) {
        level = Math.min(level+1, MAX_LEVEL);
        applyLevel();
      }
      updateHUD();
    }
    // Çarpma
    const bx=bird.x, by=bird.y, br=bird.r*0.72;
    if (bx+br > pipes[i].x-6 && bx-br < pipes[i].x+pw+6) {
      if (by-br < pipes[i].topH || by+br > pipes[i].topH+gap) { die(); return; }
    }
    if (pipes[i].x+pw < -10) pipes.splice(i,1);
  }

  // Altınlar
  for (let i=coins.length-1; i>=0; i--) {
    coins[i].x -= speed;
    if (!coins[i].ok) {
      const dx=bird.x-coins[i].x, dy=bird.y-coins[i].y;
      if (Math.sqrt(dx*dx+dy*dy) < bird.r+COIN_R) {
        coins[i].ok = true;
        coinCount++;
        score += COIN_VAL * level;
        fx(coins[i].x, coins[i].y, '#ffbe0b');
        updateHUD();
      }
    }
    if (coins[i].x < -20) coins.splice(i,1);
  }

  // Boru spawn
  const rate = Math.max(44, 128 - level*4);
  if (frame % rate === 0) addPipe();
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-coins').textContent = `🪙 ${coinCount}`;
  document.getElementById('hud-level').textContent = `SEVİYE ${level}`;
  document.getElementById('hud-best').textContent  = `EN İYİ: ${best}`;
}

// ── Loop ──────────────────────────────────
function loop() {
  update();
  drawBg(); drawPipes(); drawCoins(); drawParticles(); drawGround(); drawBird();
  if (running) animId = requestAnimationFrame(loop);
}

// ── Die ───────────────────────────────────
function die() {
  bird.alive = false; running = false;
  cancelAnimationFrame(animId);
  lastScore = score; lastCoins = coinCount;
  lastPipes = pipes.filter(p=>p.passed).length;

  if (score > best) {
    best = score;
    localStorage.setItem('fp_best_v4', best);
  }

  hideHUD();

  const isTop = leaderboard.length < 10 || score > (leaderboard[leaderboard.length-1]?.score||0);
  if (score > 0 && isTop) {
    document.getElementById('name-score').textContent = score;
    document.getElementById('ov-name').classList.add('show');
  } else {
    showGameOver();
  }
}

function showGameOver() {
  document.getElementById('go-score').textContent = lastScore;
  document.getElementById('go-record').style.display = lastScore >= best && lastScore > 0 ? 'block':'none';
  document.getElementById('go-breakdown').innerHTML =
    `Boru: <span>${lastPipes}×${PIPE_VAL}</span> &nbsp; Altın: <span>${lastCoins}×${COIN_VAL}</span><br>` +
    `Seviye: <span>${level}</span> &nbsp; Toplam: <span>${lastScore}</span>`;
  renderLB('lb-go', leaderboard, 5);
  document.getElementById('ov-gameover').classList.add('show');
}

// ── Ekran yönetimi ─────────────────────────
function showGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('hud').style.display  = 'flex';
  if ('ontouchstart' in window) document.getElementById('tap-btn').style.display = 'block';
}

function hideHUD() {
  document.getElementById('hud').style.display = 'none';
  document.getElementById('tap-btn').style.display = 'none';
}

function showMenu() {
  document.getElementById('ov-gameover').classList.remove('show');
  document.getElementById('ov-name').classList.remove('show');
  document.getElementById('game').style.display = 'none';
  hideHUD();
  document.getElementById('menu').style.display = 'flex';
  renderLB('lb-menu', leaderboard, 10);
}

// ── Start ─────────────────────────────────
function startGame() {
  resizeCanvas();
  initBird();
  pipes=[]; coins=[]; particles=[];
  score=0; coinCount=0; level=1; frame=0;
  applyLevel(); running=true;
  document.getElementById('ov-gameover').classList.remove('show');
  document.getElementById('ov-name').classList.remove('show');
  showGame();
  updateHUD();
  addPipe();
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function jump() { if (running) bird.vy = jumpF; }

// ── Events ────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); jump(); }
});

canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive:false });

document.getElementById('tap-btn').addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive:false });
document.getElementById('tap-btn').addEventListener('click', jump);

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', startGame);
document.getElementById('btn-menu').addEventListener('click', showMenu);

document.getElementById('btn-name-save').addEventListener('click', saveName);
document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') saveName(); });

function saveName() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-input').focus(); return; }
  saveScore(name, lastScore);
  document.getElementById('name-input').value = '';
  document.getElementById('ov-name').classList.remove('show');
  showGameOver();
}

window.addEventListener('resize', () => { if (running) resizeCanvas(); });
</script>
</body>
</html>
