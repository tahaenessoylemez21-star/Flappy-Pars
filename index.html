<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Pars</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#07070f;--pink:#ff006e;--yellow:#ffbe0b;--green:#00ff88;--dim:#4a4a6a;--text:#d0d0ff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'Press Start 2P',monospace;min-height:100vh;overflow:hidden;color:var(--text);}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:100;}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%);pointer-events:none;z-index:99;}
  #menu{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:20px;position:relative;z-index:10;}
  #menu h1{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.3rem,6vw,2.8rem);letter-spacing:0.2em;text-align:center;margin-bottom:4px;animation:flicker 4s infinite;}
  @keyframes flicker{0%,94%,100%{opacity:1}95%{opacity:.7}97%{opacity:.5}98%{opacity:1}}
  .t1{color:var(--yellow);text-shadow:0 0 15px var(--yellow),0 0 40px var(--yellow);}
  .t2{color:var(--pink);text-shadow:0 0 15px var(--pink),0 0 40px var(--pink);}
  .start-btn{background:transparent;border:2px solid var(--pink);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:clamp(0.55rem,2.5vw,0.75rem);padding:14px 28px;cursor:pointer;letter-spacing:0.15em;text-shadow:0 0 10px var(--pink);border-radius:4px;animation:glow-btn 2s infinite;width:100%;max-width:300px;}
  @keyframes glow-btn{0%,100%{box-shadow:0 0 10px rgba(255,0,110,0.3)}50%{box-shadow:0 0 30px rgba(255,0,110,0.7)}}
  .start-btn:active{background:rgba(255,0,110,0.15);transform:scale(0.97);}
  .char-select{width:100%;max-width:360px;}
  .char-label{font-size:clamp(0.32rem,1.5vw,0.44rem);color:var(--dim);text-align:center;margin-bottom:10px;letter-spacing:0.1em;}
  .char-grid{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
  .char-btn{width:52px;height:52px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.12);border-radius:12px;font-size:1.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;touch-action:manipulation;}
  .char-btn:active{transform:scale(0.9);}
  .char-btn.selected{border-color:var(--yellow);box-shadow:0 0 16px rgba(255,190,11,0.5);background:rgba(255,190,11,0.1);}
  .menu-lb{width:100%;max-width:360px;background:rgba(255,0,110,0.06);border:1px solid rgba(255,0,110,0.2);border-radius:6px;padding:12px;}
  .menu-lb h3{font-size:clamp(0.35rem,1.6vw,0.48rem);color:var(--yellow);text-shadow:0 0 8px var(--yellow);text-align:center;margin-bottom:10px;}
  .lb-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;margin-bottom:4px;background:rgba(255,255,255,0.03);border-radius:3px;gap:4px;}
  .lb-rank{font-size:clamp(0.26rem,1.3vw,0.35rem);min-width:20px;color:var(--dim);}
  .lb-rank.g{color:var(--yellow);text-shadow:0 0 5px var(--yellow);}
  .lb-rank.s{color:#aaaacc;}
  .lb-rank.b{color:#cc8844;}
  .lb-name{font-size:clamp(0.26rem,1.3vw,0.35rem);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-lv{font-size:clamp(0.24rem,1.2vw,0.32rem);color:var(--green);text-shadow:0 0 4px var(--green);white-space:nowrap;margin:0 4px;}
  .lb-score{font-size:clamp(0.24rem,1.2vw,0.32rem);color:var(--pink);text-shadow:0 0 4px var(--pink);}
  .lb-empty{font-size:clamp(0.26rem,1.2vw,0.35rem);color:var(--dim);text-align:center;padding:8px;}
  #game{display:none;position:fixed;inset:0;z-index:10;}
  #game-canvas{display:block;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:600;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;backdrop-filter:blur(4px);}
  .overlay.show{display:flex;}
  .overlay h2{font-family:'Orbitron',monospace;font-size:clamp(0.9rem,4vw,1.6rem);color:var(--pink);text-shadow:0 0 20px var(--pink);text-align:center;}
  .score-big{font-size:clamp(1rem,5vw,1.6rem);color:var(--yellow);text-shadow:0 0 14px var(--yellow);}
  .new-rec{font-size:clamp(0.36rem,1.7vw,0.5rem);color:var(--green);text-shadow:0 0 10px var(--green);animation:glow-btn 1s infinite;}
  .breakdown{font-size:clamp(0.26rem,1.3vw,0.36rem);color:var(--dim);text-align:center;line-height:2.4;background:rgba(255,255,255,0.03);border-radius:4px;padding:10px 14px;border:1px solid rgba(255,255,255,0.05);width:100%;max-width:280px;}
  .breakdown span{color:var(--yellow);}
  .go-lb{width:100%;max-width:300px;background:rgba(255,0,110,0.05);border:1px solid rgba(255,0,110,0.12);border-radius:4px;padding:10px;}
  .go-lb h4{font-size:clamp(0.3rem,1.5vw,0.42rem);color:var(--yellow);text-align:center;margin-bottom:8px;}
  .ov-btn{background:transparent;border:2px solid var(--pink);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:clamp(0.48rem,2.2vw,0.65rem);padding:13px 20px;cursor:pointer;letter-spacing:0.12em;text-shadow:0 0 8px var(--pink);border-radius:4px;width:100%;max-width:280px;animation:glow-btn 2s infinite;}
  .ov-btn:active{background:rgba(255,0,110,0.15);}
  .ov-btn.green{border-color:var(--green);color:var(--green);text-shadow:0 0 8px var(--green);}
  .name-input{background:rgba(255,0,110,0.08);border:1px solid rgba(255,0,110,0.4);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:clamp(0.42rem,2vw,0.58rem);padding:12px 14px;border-radius:4px;text-align:center;width:100%;max-width:260px;letter-spacing:0.1em;outline:none;}
  .name-input::placeholder{color:var(--dim);}
  .name-input:focus{border-color:rgba(255,0,110,0.8);}
</style>
</head>
<body>

<div id="menu">
  <h1><span class="t1">FLAPPY</span> <span class="t2">PARS</span></h1>
  <div class="char-select">
    <div class="char-label">KARAKTERİNİ SEÇ</div>
    <div class="char-grid" id="char-grid"></div>
  </div>
  <button class="start-btn" id="start-btn">▶ OYNA</button>
  <div class="menu-lb">
    <h3>🏆 LİDERLİK — EN YÜKSEK SEVİYE</h3>
    <div id="lb-menu"><div class="lb-empty">Yükleniyor...</div></div>
  </div>
</div>

<div id="game"><canvas id="game-canvas"></canvas></div>

<div class="overlay" id="ov-go">
  <h2>OYUN BİTTİ</h2>
  <div class="score-big" id="go-score">0</div>
  <div class="new-rec" id="go-rec" style="display:none;">★ YENİ REKOR! ★</div>
  <div class="breakdown" id="go-bd"></div>
  <div class="go-lb"><h4>🏆 LİDERLİK</h4><div id="lb-go"></div></div>
  <button class="ov-btn" id="btn-restart">▶ TEKRAR</button>
  <button class="ov-btn green" id="btn-menu">ANA MENÜ</button>
</div>

<div class="overlay" id="ov-name">
  <h2>🏆 OYUN BİTTİ</h2>
  <div class="score-big" id="name-sc">0</div>
  <p style="font-size:clamp(0.3rem,1.4vw,0.42rem);color:var(--dim);text-align:center;">Skoru kaydetmek için<br>isminizi girin:</p>
  <input class="name-input" id="name-inp" maxlength="10" placeholder="İSMİNİ YAZ" autocomplete="off"/>
  <button class="ov-btn" id="btn-save">KAYDET ▶</button>
  <button class="ov-btn green" id="btn-skip">ATLA</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBLwHbX1MwJEzyJ71GRtLkcChkgatFAgS0",
  authDomain:"flappy-pars.firebaseapp.com",
  databaseURL:"https://flappy-pars-default-rtdb.firebaseio.com",
  projectId:"flappy-pars",
  storageBucket:"flappy-pars.firebasestorage.app",
  messagingSenderId:"995587188702",
  appId:"1:995587188702:web:e0042cb45d617b47ef9f4f"
});

const db = firebase.database();
const REF = db.ref('fp_scores');
let LB = [];

// ✅ Tüm skorları çek, isim başına en iyiyi al, seviyeye göre sırala
REF.on('value', snap => {
  const all = {};
  snap.forEach(child => {
    const d = child.val();
    const key = d.name;
    // Her isim için en yüksek seviyeyi, eşitse en yüksek skoru tut
    if (!all[key] ||
        d.level > all[key].level ||
        (d.level === all[key].level && d.score > all[key].score)) {
      all[key] = d;
    }
  });
  // Objeyi diziye çevir, sırala
  LB = Object.values(all)
    .sort((a,b) => b.level !== a.level ? b.level - a.level : b.score - a.score)
    .slice(0, 10);
  renderLB('lb-menu', LB, 10);
});

function saveSc(name, score, level) {
  REF.push({
    name: name.toUpperCase().trim().slice(0,10),
    score,
    level,
    date: Date.now()
  });
}

function renderLB(id, data, max) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!data.length) { el.innerHTML = '<div class="lb-empty">Henüz skor yok!</div>'; return; }
  const M = ['🥇','🥈','🥉'], C = ['g','s','b'];
  el.innerHTML = data.slice(0, max).map((r, i) => `
    <div class="lb-row">
      <span class="lb-rank ${C[i]||''}">${M[i]||i+1}</span>
      <span class="lb-name">${r.name}</span>
      <span class="lb-lv">Lv${r.level}</span>
      <span class="lb-score">${r.score}</span>
    </div>`).join('');
}

// Karakterler
const CHARS = [
  {emoji:'🐆', glow:'#ffbe0b'},
  {emoji:'🚀', glow:'#00f5ff'},
  {emoji:'🛸', glow:'#cc00ff'},
  {emoji:'⭐', glow:'#ffbe0b'},
  {emoji:'🦋', glow:'#ff006e'},
  {emoji:'🐉', glow:'#00ff88'},
  {emoji:'🔥', glow:'#ff4400'},
  {emoji:'🌙', glow:'#aaaaff'},
];
let selectedChar = 0;
const charGrid = document.getElementById('char-grid');
CHARS.forEach((c,i) => {
  const btn = document.createElement('button');
  btn.className = 'char-btn' + (i===0?' selected':'');
  btn.textContent = c.emoji;
  btn.onclick = () => {
    selectedChar = i;
    document.querySelectorAll('.char-btn').forEach((b,j) => b.classList.toggle('selected', j===i));
  };
  charGrid.appendChild(btn);
});

// Canvas
const CV = document.getElementById('game-canvas');
const CX = CV.getContext('2d');
const W = window.innerWidth, H = window.innerHeight;
CV.width = W; CV.height = H;
CV.style.width = W+'px'; CV.style.height = H+'px';

const PIPE_W = Math.floor(W*0.18);
const BIRD_R = Math.floor(W*0.07);
const COIN_R = Math.floor(W*0.03);
const GROUND_H = Math.floor(H*0.06);
const MAX_LV = 20;
const PIPE_V = 10, COIN_V = 5;
const GR_S=0.14, GR_M=0.40;
const JP_S=-5.0, JP_M=-7.4;
const SP_S=1.5, SP_M=5.5;
const GA_S=H*0.42, GA_M=H*0.25;
const DIST_S=W*0.60, DIST_M=W*0.42;

let bird, pipes, coins, parts;
let score, coins_n, lv, sp, gr, jp;
let run, aid, frm, pipesPassed;
let lscore, lcoins, lpipes, llevel;
let best = parseInt(localStorage.getItem('fp_best')||'0');

const STARS = Array.from({length:80}, () => ({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.6+0.4, a:Math.random(), da:0.003+Math.random()*0.01
}));

function lvv(s,m,l){return s+(m-s)*Math.min((l-1)/(MAX_LV-1),1);}
function applyLv(){sp=lvv(SP_S,SP_M,lv);gr=lvv(GR_S,GR_M,lv);jp=lvv(JP_S,JP_M,lv);}
function getGa(){return lvv(GA_S,GA_M,lv);}
function getDist(){return lvv(DIST_S,DIST_M,lv);}
function initBird(){bird={x:W*0.22,y:H*0.45,vy:0,r:BIRD_R,alive:true};}

function addPipe(){
  const ga=getGa();
  const remaining=(H-GROUND_H)-ga;
  const minTop=Math.floor(remaining*0.15);
  const maxTop=Math.floor(remaining*0.55);
  const topH=minTop+Math.random()*(maxTop-minTop);
  pipes.push({x:W+PIPE_W,topH,ga,passed:false});
  const mid=topH+ga/2;
  for(let i=0;i<3;i++){
    coins.push({
      x:W+PIPE_W*0.5+(W*0.12)*i+Math.random()*12,
      y:mid+(Math.random()-0.5)*ga*0.5,
      ok:false,a:Math.random()*Math.PI*2
    });
  }
}

function fx(x,y,col){
  for(let i=0;i<12;i++){
    const ang=(Math.PI*2/12)*i,s=2+Math.random()*4;
    parts.push({x,y,vx:Math.cos(ang)*s,vy:Math.sin(ang)*s-1,life:1,decay:0.045+Math.random()*0.03,col,sz:2+Math.random()*4});
  }
}

function drawBg(){
  const g=CX.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#080418');g.addColorStop(0.6,'#0d1030');g.addColorStop(1,'#0a1820');
  CX.fillStyle=g;CX.fillRect(0,0,W,H);
  STARS.forEach(s=>{
    s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;
    CX.globalAlpha=s.a*0.65;CX.fillStyle='#fff';
    CX.beginPath();CX.arc(s.x,s.y,s.r,0,Math.PI*2);CX.fill();
  });
  CX.globalAlpha=1;
}

function drawGround(){
  CX.fillStyle='#0d200d';CX.fillRect(0,H-GROUND_H,W,GROUND_H);
  CX.strokeStyle='#00ff88';CX.lineWidth=2;
  CX.beginPath();CX.moveTo(0,H-GROUND_H);CX.lineTo(W,H-GROUND_H);CX.stroke();
  CX.strokeStyle='rgba(0,255,136,0.12)';CX.lineWidth=1;
  for(let x=(frm*sp)%40;x<W;x+=40){
    CX.beginPath();CX.moveTo(x,H-GROUND_H);CX.lineTo(x+20,H);CX.stroke();
  }
}

function drawPipes(){
  pipes.forEach(p=>{
    const tg=CX.createLinearGradient(p.x,0,p.x+PIPE_W,0);
    tg.addColorStop(0,'#005520');tg.addColorStop(0.4,'#00aa44');tg.addColorStop(1,'#003310');
    CX.shadowColor='#00ff66';CX.shadowBlur=10;CX.fillStyle=tg;
    const cap=Math.floor(PIPE_W*0.15);
    CX.fillRect(p.x,0,PIPE_W,p.topH);
    CX.fillRect(p.x-cap,p.topH-cap*2,PIPE_W+cap*2,cap*2);
    const by=p.topH+p.ga;
    CX.fillRect(p.x,by,PIPE_W,H-by-GROUND_H);
    CX.fillRect(p.x-cap,by,PIPE_W+cap*2,cap*2);
    CX.shadowBlur=0;
  });
}

function drawCoins(){
  coins.forEach(c=>{
    if(c.ok)return;
    c.a+=0.08;const w=Math.sin(c.a)*3;
    CX.shadowColor='#ffbe0b';CX.shadowBlur=14;
    CX.fillStyle='#ffbe0b';
    CX.beginPath();CX.arc(c.x,c.y+w,COIN_R,0,Math.PI*2);CX.fill();
    CX.shadowBlur=0;
    CX.fillStyle='#ffe566';
    CX.beginPath();CX.arc(c.x-COIN_R*0.3,c.y+w-COIN_R*0.3,COIN_R*0.35,0,Math.PI*2);CX.fill();
    CX.fillStyle='#cc8800';
    CX.font=`bold ${COIN_R*1.1}px serif`;
    CX.textAlign='center';CX.textBaseline='middle';
    CX.fillText('₺',c.x,c.y+w+1);
  });
}

function drawParts(){
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=p.decay;
    CX.globalAlpha=Math.max(0,p.life);
    CX.shadowColor=p.col;CX.shadowBlur=6;CX.fillStyle=p.col;
    CX.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  });
  CX.globalAlpha=1;CX.shadowBlur=0;
}

function drawBird(){
  const ch=CHARS[selectedChar];
  CX.save();CX.translate(bird.x,bird.y);
  CX.rotate(Math.max(-0.5,Math.min(Math.PI/2,bird.vy*0.065)));
  CX.shadowColor=ch.glow;CX.shadowBlur=24;
  CX.font=`${BIRD_R*2.2}px serif`;
  CX.textAlign='center';CX.textBaseline='middle';
  CX.fillText(ch.emoji,0,0);
  CX.shadowBlur=0;CX.restore();
}

function drawHUD(){
  const fs1=Math.max(11,W*0.04);
  const fs2=Math.max(10,W*0.035);
  CX.shadowColor='rgba(255,190,11,0.7)';CX.shadowBlur=8;
  CX.fillStyle='#ffbe0b';
  CX.font=`${fs1}px 'Press Start 2P',monospace`;
  CX.textAlign='left';
  CX.fillText(`🪙 ${coins_n}`,12,fs1+6);
  CX.fillStyle='#ff006e';CX.shadowColor='rgba(255,0,110,0.6)';
  CX.font=`${fs2}px 'Press Start 2P',monospace`;
  CX.fillText(`SEVİYE ${lv}`,12,fs1+fs2+12);
  CX.shadowColor='rgba(255,190,11,0.9)';CX.shadowBlur=14;
  CX.fillStyle='#ffbe0b';
  CX.font=`bold ${Math.max(20,W*0.07)}px 'Press Start 2P',monospace`;
  CX.textAlign='center';
  CX.fillText(score,W/2,Math.max(28,W*0.08));
  CX.shadowBlur=0;
}

function update(){
  if(!bird.alive)return;
  frm++;bird.vy+=gr;bird.y+=bird.vy;
  if(bird.y+bird.r>=H-GROUND_H||bird.y-bird.r<=0){die();return;}
  for(let i=pipes.length-1;i>=0;i--){
    pipes[i].x-=sp;
    if(!pipes[i].passed&&pipes[i].x+PIPE_W<bird.x){
      pipes[i].passed=true;score+=PIPE_V*lv;pipesPassed++;
      if(pipesPassed%3===0){lv=Math.min(lv+1,MAX_LV);applyLv();}
    }
    const cap=Math.floor(PIPE_W*0.15),br=bird.r*0.7;
    if(bird.x+br>pipes[i].x-cap&&bird.x-br<pipes[i].x+PIPE_W+cap){
      if(bird.y-br<pipes[i].topH||bird.y+br>pipes[i].topH+pipes[i].ga){die();return;}
    }
    if(pipes[i].x+PIPE_W<-10)pipes.splice(i,1);
  }
  const rx=pipes.length>0?Math.max(...pipes.map(p=>p.x)):-999;
  if(rx<=W-getDist())addPipe();
  for(let i=coins.length-1;i>=0;i--){
    coins[i].x-=sp;
    if(!coins[i].ok){
      const dx=bird.x-coins[i].x,dy=bird.y-coins[i].y;
      if(Math.sqrt(dx*dx+dy*dy)<bird.r+COIN_R){
        coins[i].ok=true;coins_n++;score+=COIN_V*lv;
        fx(coins[i].x,coins[i].y,CHARS[selectedChar].glow);
      }
    }
    if(coins[i].x<-20)coins.splice(i,1);
  }
}

function loop(){
  update();drawBg();drawPipes();drawCoins();drawParts();drawGround();drawBird();drawHUD();
  if(run)aid=requestAnimationFrame(loop);
}

function die(){
  bird.alive=false;run=false;cancelAnimationFrame(aid);
  lscore=score;lcoins=coins_n;lpipes=pipesPassed;llevel=lv;
  if(score>best){best=score;localStorage.setItem('fp_best',best);}
  // Her zaman isim sor
  document.getElementById('name-sc').textContent=`Lv${lv} — ${score} puan`;
  document.getElementById('ov-name').classList.add('show');
}

function showGO(){
  document.getElementById('go-score').textContent=`Lv${llevel} — ${lscore} puan`;
  document.getElementById('go-rec').style.display=lscore>=best&&lscore>0?'block':'none';
  document.getElementById('go-bd').innerHTML=
    `Boru: <span>${lpipes}×${PIPE_V}</span> Altın: <span>${lcoins}×${COIN_V}</span><br>`+
    `Seviye: <span>${llevel}</span> Toplam: <span>${lscore}</span>`;
  renderLB('lb-go',LB,5);
  document.getElementById('ov-go').classList.add('show');
}

function showGame(){
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='block';
}

function showMenu(){
  document.getElementById('ov-go').classList.remove('show');
  document.getElementById('ov-name').classList.remove('show');
  document.getElementById('game').style.display='none';
  document.getElementById('menu').style.display='flex';
  renderLB('lb-menu',LB,10);
}

function startGame(){
  initBird();pipes=[];coins=[];parts=[];
  score=0;coins_n=0;lv=1;frm=0;pipesPassed=0;
  applyLv();run=true;
  document.getElementById('ov-go').classList.remove('show');
  document.getElementById('ov-name').classList.remove('show');
  showGame();addPipe();
  if(aid)cancelAnimationFrame(aid);
  aid=requestAnimationFrame(loop);
}

function jump(){if(run)bird.vy=jp;}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
CV.addEventListener('click',jump);
CV.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('btn-restart').addEventListener('click',startGame);
document.getElementById('btn-menu').addEventListener('click',showMenu);
document.getElementById('btn-save').addEventListener('click',saveN);
document.getElementById('btn-skip').addEventListener('click',()=>{
  document.getElementById('ov-name').classList.remove('show');
  showGO();
});
document.getElementById('name-inp').addEventListener('keydown',e=>{if(e.key==='Enter')saveN();});

function saveN(){
  const n=document.getElementById('name-inp').value.trim();
  if(!n){document.getElementById('name-inp').focus();return;}
  saveSc(n,lscore,llevel);
  document.getElementById('name-inp').value='';
  document.getElementById('ov-name').classList.remove('show');
  showGO();
}
</script>
</body>
</html>
