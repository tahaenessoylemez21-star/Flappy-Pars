<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Pars</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070f;
    --panel: #0f0f1a;
    --pink: #ff006e;
    --yellow: #ffbe0b;
    --green: #00ff88;
    --dim: #4a4a6a;
    --text: #d0d0ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative; color: var(--text);
  }
  body::before {
    content:''; position:fixed; inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    pointer-events:none; z-index:100;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%);
    pointer-events:none; z-index:99;
  }
  .grid-bg {
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,0,110,0.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,0,110,0.02) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none;
  }
  /* Ana ekran */
  .screen { display:none; flex-direction:column; align-items:center; justify-content:center; width:100%; position:relative; z-index:10; }
  .screen.active { display:flex; }

  /* Başlık */
  h1 {
    font-family:'Orbitron',monospace; font-weight:900;
    font-size:clamp(1rem,5vw,2.2rem);
    letter-spacing:0.2em; margin-bottom:16px;
    animation:flicker 4s infinite;
  }
  .title-flappy{color:var(--yellow);text-shadow:0 0 10px var(--yellow),0 0 30px var(--yellow);}
  .title-pars{color:var(--pink);text-shadow:0 0 10px var(--pink),0 0 30px var(--pink);}
  @keyframes flicker{0%,94%,100%{opacity:1}95%{opacity:.7}97%{opacity:.5}98%{opacity:1}}

  /* Menü */
  .menu-screen {
    gap: 20px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
  }
  .action-btn {
    background:transparent; border:2px solid var(--pink); color:var(--pink);
    font-family:'Press Start 2P',monospace; font-size:0.6rem;
    padding:14px 24px; cursor:pointer; letter-spacing:0.12em;
    text-shadow:0 0 10px var(--pink); border-radius:2px;
    transition:background 0.15s; animation:pulse-btn 2s infinite;
    width:100%; max-width:280px;
  }
  .action-btn:hover{background:rgba(255,0,110,0.12);}
  .action-btn.green{border-color:var(--green);color:var(--green);text-shadow:0 0 10px var(--green);}
  .action-btn.green:hover{background:rgba(0,255,136,0.12);}
  @keyframes pulse-btn{0%,100%{box-shadow:0 0 10px rgba(255,0,110,0.2)}50%{box-shadow:0 0 28px rgba(255,0,110,0.5)}}

  /* Liderlik tablosu menüde */
  .menu-lb {
    width:100%; max-width:340px;
    background: rgba(255,0,110,0.05);
    border:1px solid rgba(255,0,110,0.15);
    border-radius:4px; padding:12px;
  }
  .menu-lb-title {
    font-size:0.45rem; color:var(--yellow);
    text-shadow:0 0 8px var(--yellow);
    text-align:center; margin-bottom:10px;
    letter-spacing:0.1em;
  }
  .lb-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:4px;padding:4px 6px;background:rgba(255,255,255,0.02);border-radius:2px;}
  .lb-rank{font-size:0.32rem;color:var(--dim);min-width:20px;}
  .lb-rank.gold{color:var(--yellow);text-shadow:0 0 6px var(--yellow);}
  .lb-rank.silver{color:#aaaacc;}
  .lb-rank.bronze{color:#cc8844;}
  .lb-name{font-size:0.32rem;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-score{font-size:0.32rem;color:var(--pink);text-shadow:0 0 4px var(--pink);}
  .lb-empty{font-size:0.3rem;color:var(--dim);text-align:center;padding:8px 0;}

  /* Oyun ekranı */
  .game-screen {
    padding: 0;
    width: 100vw;
    height: 100vh;
    justify-content: flex-start;
  }

  #game-canvas {
    display:block;
    image-rendering:pixelated;
  }

  /* HUD üst bar */
  .hud-bar {
    display:none;
    position:fixed; top:0; left:0; right:0;
    padding:6px 12px;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(4px);
    z-index:200;
    align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(255,0,110,0.15);
  }
  .hud-bar.active { display:flex; }
  .hud-item { font-size:0.45rem; }
  .hud-score { color:var(--yellow); text-shadow:0 0 8px var(--yellow); }
  .hud-coins { color:var(--yellow); text-shadow:0 0 6px var(--yellow); }
  .hud-level { color:var(--pink); text-shadow:0 0 6px var(--pink); }
  .hud-best  { color:var(--dim); font-size:0.38rem; }

  /* Touch */
  .touch-controls{display:none;position:fixed;bottom:16px;left:0;right:0;align-items:center;z-index:200;}
  .tap-btn{width:90%;max-width:380px;padding:18px;background:rgba(255,0,110,0.1);border:2px solid rgba(255,0,110,0.45);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:0.75rem;border-radius:10px;cursor:pointer;letter-spacing:0.1em;text-shadow:0 0 8px var(--pink);touch-action:manipulation;user-select:none;-webkit-user-select:none;transition:background 0.08s,transform 0.08s;}
  .tap-btn:active{background:rgba(255,0,110,0.28);transform:scale(0.96);}

  /* Overlay (oyun içi) */
  .game-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);z-index:300;gap:12px;backdrop-filter:blur(3px);padding:20px;}
  .game-overlay.active{display:flex;}
  .game-overlay h2{font-family:'Orbitron',monospace;font-size:clamp(0.9rem,3vw,1.4rem);color:var(--pink);text-shadow:0 0 20px var(--pink);text-align:center;}
  .game-overlay p{font-size:0.38rem;color:var(--dim);text-align:center;line-height:2.2;}
  .score-big{font-size:1rem;color:var(--yellow);text-shadow:0 0 12px var(--yellow);}
  .new-record{font-size:0.38rem;color:var(--green);text-shadow:0 0 8px var(--green);animation:pulse-btn 1s infinite;}
  .score-breakdown{font-size:0.3rem;color:var(--dim);text-align:center;line-height:2.2;background:rgba(255,255,255,0.03);border-radius:4px;padding:8px 12px;border:1px solid rgba(255,255,255,0.05);}
  .score-breakdown span{color:var(--yellow);}

  /* Go LB */
  .go-lb{width:100%;max-width:280px;background:rgba(255,0,110,0.05);border:1px solid rgba(255,0,110,0.1);border-radius:4px;padding:10px;}
  .go-lb-title{font-size:0.32rem;color:var(--yellow);text-align:center;margin-bottom:8px;}

  /* Name input */
  .name-input{background:rgba(255,0,110,0.08);border:1px solid rgba(255,0,110,0.35);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:0.5rem;padding:10px 12px;border-radius:2px;text-align:center;width:100%;max-width:220px;letter-spacing:0.1em;outline:none;}
  .name-input::placeholder{color:var(--dim);}
  .name-input:focus{border-color:rgba(255,0,110,0.7);}

  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- HUD -->
<div class="hud-bar" id="hud-bar">
  <div class="hud-item hud-score" id="hud-score">0</div>
  <div class="hud-item hud-coins" id="hud-coins">🪙0</div>
  <div class="hud-item hud-level" id="hud-level">LV1</div>
  <div class="hud-item hud-best" id="hud-best">EN İYİ: 0</div>
</div>

<!-- Touch -->
<div class="touch-controls" id="touch-controls">
  <button class="tap-btn" id="tap-btn">🐆 ZIPLA!</button>
</div>

<!-- MENÜ EKRANI -->
<div class="screen menu-screen active" id="menu-screen">
  <h1><span class="title-flappy">FLAPPY</span> <span class="title-pars">PARS 🐆</span></h1>

  <button class="action-btn" id="start-btn">▶ BAŞLA</button>

  <div class="menu-lb">
    <div class="menu-lb-title">🏆 LİDERLİK TABLOSU</div>
    <div id="lb-list"><div class="lb-empty">Yükleniyor...</div></div>
  </div>

  <div style="font-size:0.3rem;color:var(--dim);text-align:center;line-height:2;">
    🪙 Altın = 5×Seviye &nbsp; | &nbsp; Boru = 10×Seviye
  </div>
</div>

<!-- OYUN CANVAS -->
<div class="screen game-screen" id="game-screen">
  <canvas id="game-canvas"></canvas>
</div>

<!-- Oyun sonu overlay -->
<div class="game-overlay" id="gameover-overlay">
  <h2>OYUN BİTTİ</h2>
  <div class="score-big" id="final-score">0</div>
  <div class="new-record" id="new-record" style="display:none;">★ YENİ REKOR! ★</div>
  <div class="score-breakdown" id="score-breakdown"></div>
  <div class="go-lb"><div class="go-lb-title">🏆 TOP 5</div><div id="go-lb-list"></div></div>
  <button class="action-btn" id="restart-btn">TEKRAR</button>
  <button class="action-btn green" id="menu-btn">ANA MENÜ</button>
</div>

<!-- İsim overlay -->
<div class="game-overlay" id="name-overlay">
  <h2>🏆 REKOR!</h2>
  <div class="score-big" id="name-score">0</div>
  <p style="font-size:0.34rem;">İsmin nedir?</p>
  <input class="name-input" id="name-input" maxlength="10" placeholder="İSMİNİ YAZ" autocomplete="off"/>
  <button class="action-btn" id="name-submit">KAYDET ▶</button>
</div>

<script>
const FB_CONFIG = {
  apiKey: "AIzaSyBLwHbX1MwJEzyJ71GRtLkcChkgatFAgS0",
  authDomain: "flappy-pars.firebaseapp.com",
  databaseURL: "https://flappy-pars-default-rtdb.firebaseio.com",
  projectId: "flappy-pars",
  storageBucket: "flappy-pars.firebasestorage.app",
  messagingSenderId: "995587188702",
  appId: "1:995587188702:web:e0042cb45d617b47ef9f4f"
};
</script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp(FB_CONFIG);
const db = firebase.database();
const scoresRef = db.ref('flappy_pars_scores');
let leaderboard = [];

function loadLeaderboard() {
  scoresRef.orderByChild('score').limitToLast(10).on('value', snap => {
    leaderboard = [];
    snap.forEach(c => leaderboard.push(c.val()));
    leaderboard.sort((a,b) => b.score - a.score);
    renderLB('lb-list', leaderboard, 10);
  });
}

function saveScore(name, score) {
  scoresRef.push({ name: name.toUpperCase().slice(0,10), score, date: Date.now() });
}

function renderLB(id, data, max) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!data.length) { el.innerHTML='<div class="lb-empty">Henüz skor yok</div>'; return; }
  const medals=['🥇','🥈','🥉'], cls=['gold','silver','bronze'];
  el.innerHTML = data.slice(0,max).map((r,i)=>`
    <div class="lb-row">
      <span class="lb-rank ${cls[i]||''}">${medals[i]||i+1}</span>
      <span class="lb-name">${r.name}</span>
      <span class="lb-score">${r.score}</span>
    </div>`).join('');
}

loadLeaderboard();

// ── Canvas tam ekran ───────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Sabitler ───────────────────────────────
const GRAVITY_START  = 0.14;
const GRAVITY_MAX    = 0.36;
const JUMP_START     = -4.8;
const JUMP_MAX       = -6.8;
const SPEED_START    = 1.0;
const SPEED_MAX      = 3.2;
const GAP_START      = 220;
const GAP_MIN        = 115;
const PIPE_VALUE     = 10;
const COIN_VALUE     = 5;
const COIN_R         = 12;
const MAX_LEVEL      = 20;

let bird, pipes, coins, particles;
let score, coinCount, level, speed, gap, gravity, jumpForce;
let gameRunning, animId, frameCount;
let lastScore, lastCoins, lastPipes;
let bestScore = parseInt(localStorage.getItem('fp_best_v3')||'0');

const stars = Array.from({length:80},()=>({
  x:Math.random()*1000, y:Math.random()*1000,
  r:Math.random()*1.5+0.3, a:Math.random(),
  da:0.003+Math.random()*0.01
}));

function getLV(start, max, lvl) {
  const t = Math.min((lvl-1)/(MAX_LEVEL-1), 1);
  return start + (max-start)*t;
}

function updateLevelStats() {
  speed     = getLV(SPEED_START, SPEED_MAX, level);
  gap       = getLV(GAP_START, GAP_MIN, level);
  gravity   = getLV(GRAVITY_START, GRAVITY_MAX, level);
  jumpForce = getLV(JUMP_START, JUMP_MAX, level);
}

function W() { return canvas.width; }
function H() { return canvas.height; }

function initBird() {
  bird = { x:W()*0.22, y:H()*0.45, vy:0, radius:18, alive:true };
}

function addPipe() {
  const topH = 60 + Math.random()*(H()-gap-160);
  pipes.push({ x:W()+50, topH, passed:false });
  const gapMid = topH+gap/2;
  const spacing = W()*0.18;
  for (let i=0; i<3; i++) {
    coins.push({
      x: W()+50+20+spacing*i+Math.random()*20,
      y: gapMid+(Math.random()-0.5)*(gap*0.5),
      collected:false, anim:Math.random()*Math.PI*2,
    });
  }
}

function spawnCoinFX(x, y) {
  for (let i=0; i<10; i++) {
    const angle=(Math.PI*2/10)*i, spd=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-1,life:1,decay:0.05,color:Math.random()>0.5?'#ffbe0b':'#ffffff',size:2+Math.random()*4});
  }
}

function drawBg() {
  const g=ctx.createLinearGradient(0,0,0,H());
  g.addColorStop(0,'#080418'); g.addColorStop(0.6,'#0d1030'); g.addColorStop(1,'#0a1820');
  ctx.fillStyle=g; ctx.fillRect(0,0,W(),H());
  stars.forEach(s=>{
    s.a+=s.da; if(s.a>1||s.a<0) s.da*=-1;
    ctx.globalAlpha=s.a*0.7; ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x%W(),s.y%H(),s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawGround() {
  const gh = Math.max(32, H()*0.06);
  ctx.fillStyle='#0d200d'; ctx.fillRect(0,H()-gh,W(),gh);
  ctx.strokeStyle='#00ff88'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,H()-gh); ctx.lineTo(W(),H()-gh); ctx.stroke();
  ctx.strokeStyle='rgba(0,255,136,0.15)'; ctx.lineWidth=1;
  for(let x=(frameCount*speed)%40;x<W();x+=40){
    ctx.beginPath(); ctx.moveTo(x,H()-gh); ctx.lineTo(x+20,H()); ctx.stroke();
  }
}

function getGH() { return Math.max(32, H()*0.06); }

function drawPipe(p) {
  const pw = Math.max(44, W()*0.1);
  p.w = pw;
  const tg=ctx.createLinearGradient(p.x,0,p.x+pw,0);
  tg.addColorStop(0,'#005520'); tg.addColorStop(0.4,'#00aa44'); tg.addColorStop(1,'#003310');
  ctx.shadowColor='#00ff66'; ctx.shadowBlur=10; ctx.fillStyle=tg;
  ctx.fillRect(p.x,0,pw,p.topH);
  ctx.fillRect(p.x-5,p.topH-18,pw+10,18);
  const botY=p.topH+gap;
  ctx.fillRect(p.x,botY,pw,H()-botY-getGH());
  ctx.fillRect(p.x-5,botY,pw+10,18);
  ctx.shadowBlur=0;
}

function drawCoin(c) {
  if(c.collected) return;
  c.anim+=0.08;
  const wobble=Math.sin(c.anim)*3;
  ctx.shadowColor='#ffbe0b'; ctx.shadowBlur=16;
  ctx.fillStyle='#ffbe0b';
  ctx.beginPath(); ctx.arc(c.x,c.y+wobble,COIN_R,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffe566';
  ctx.beginPath(); ctx.arc(c.x-3,c.y+wobble-3,COIN_R*0.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#cc8800';
  ctx.font=`bold ${COIN_R}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('₺',c.x,c.y+wobble+1);
}

function drawParticles() {
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=p.decay;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.shadowColor=p.color; ctx.shadowBlur=6; ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawBird() {
  ctx.save(); ctx.translate(bird.x,bird.y);
  ctx.rotate(Math.max(-0.5,Math.min(Math.PI/2,bird.vy*0.06)));
  ctx.shadowColor='#ffbe0b'; ctx.shadowBlur=22;
  const sz = Math.max(32, W()*0.08);
  ctx.font=`${sz}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🐆',0,0);
  ctx.shadowBlur=0; ctx.restore();
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-coins').textContent = `🪙${coinCount}`;
  document.getElementById('hud-level').textContent = `LV${level}`;
  document.getElementById('hud-best').textContent  = `EN İYİ: ${bestScore}`;
}

function update() {
  if(!bird.alive) return;
  frameCount++;
  bird.vy+=gravity; bird.y+=bird.vy;
  const gh = getGH();
  if(bird.y+bird.radius>=H()-gh||bird.y-bird.radius<=0){die();return;}

  for(let i=pipes.length-1;i>=0;i--){
    const pw = pipes[i].w || Math.max(44,W()*0.1);
    pipes[i].x-=speed;
    if(!pipes[i].passed&&pipes[i].x+pw<bird.x){
      pipes[i].passed=true;
      score+=PIPE_VALUE*level;
      const passedCount=pipes.filter(p=>p.passed).length;
      if(passedCount>0&&passedCount%5===0){
        level=Math.min(level+1,MAX_LEVEL);
        updateLevelStats();
      }
      updateHUD();
    }
    const bx=bird.x,by=bird.y,br=bird.radius*0.7;
    if(bx+br>pipes[i].x-5&&bx-br<pipes[i].x+pw+5){
      if(by-br<pipes[i].topH||by+br>pipes[i].topH+gap){die();return;}
    }
    if(pipes[i].x+pw<-10) pipes.splice(i,1);
  }

  for(let i=coins.length-1;i>=0;i--){
    coins[i].x-=speed;
    if(!coins[i].collected){
      const dx=bird.x-coins[i].x, dy=bird.y-coins[i].y;
      if(Math.sqrt(dx*dx+dy*dy)<bird.radius+COIN_R){
        coins[i].collected=true; coinCount++;
        score+=COIN_VALUE*level;
        spawnCoinFX(coins[i].x,coins[i].y);
        updateHUD();
      }
    }
    if(coins[i].x<-20) coins.splice(i,1);
  }

  const spawnRate=Math.max(45,120-level*4);
  if(frameCount%spawnRate===0) addPipe();
}

function die() {
  bird.alive=false; gameRunning=false;
  cancelAnimationFrame(animId);
  lastScore=score; lastCoins=coinCount;
  lastPipes=pipes.filter(p=>p.passed).length;
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem('fp_best_v3',bestScore);
  }
  document.getElementById('hud-bar').classList.remove('active');
  if('ontouchstart'in window) document.getElementById('touch-controls').style.display='none';

  const isTop=leaderboard.length<10||score>(leaderboard[leaderboard.length-1]?.score||0);
  if(score>0&&isTop){
    document.getElementById('name-score').textContent=score;
    document.getElementById('name-overlay').classList.add('active');
  } else showGameOver();
}

function showGameOver() {
  document.getElementById('final-score').textContent=lastScore;
  document.getElementById('new-record').style.display=lastScore>=bestScore&&lastScore>0?'block':'none';
  document.getElementById('score-breakdown').innerHTML=
    `Boru: <span>${lastPipes}×${PIPE_VALUE}</span> Altın: <span>${lastCoins}×${COIN_VALUE}</span><br>`+
    `Seviye: <span>${level}</span> Toplam: <span>${lastScore}</span>`;
  renderLB('go-lb-list',leaderboard,5);
  document.getElementById('gameover-overlay').classList.add('active');
}

function loop() {
  update(); drawBg();
  pipes.forEach(drawPipe); coins.forEach(drawCoin);
  drawParticles(); drawGround(); drawBird();
  if(gameRunning) animId=requestAnimationFrame(loop);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  initBird(); pipes=[]; coins=[]; particles=[];
  score=0; coinCount=0; level=1; frameCount=0;
  updateLevelStats(); gameRunning=true;
  resizeCanvas();
  document.getElementById('gameover-overlay').classList.remove('active');
  document.getElementById('name-overlay').classList.remove('active');
  showScreen('game-screen');
  document.getElementById('hud-bar').classList.add('active');
  if('ontouchstart'in window) document.getElementById('touch-controls').style.display='flex';
  updateHUD();
  addPipe();
  if(animId) cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function goToMenu() {
  gameRunning=false;
  if(animId) cancelAnimationFrame(animId);
  document.getElementById('gameover-overlay').classList.remove('active');
  document.getElementById('name-overlay').classList.remove('active');
  document.getElementById('hud-bar').classList.remove('active');
  if('ontouchstart'in window) document.getElementById('touch-controls').style.display='none';
  showScreen('menu-screen');
}

function jump(){if(gameRunning) bird.vy=jumpForce;}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();jump();}
  if(e.code==='Escape') goToMenu();
});
canvas.addEventListener('click',jump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
document.getElementById('tap-btn').addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
document.getElementById('tap-btn').addEventListener('click',jump);
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);
document.getElementById('menu-btn').addEventListener('click',goToMenu);
document.getElementById('name-submit').addEventListener('click',submitName);
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitName();});

function submitName(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){document.getElementById('name-input').focus();return;}
  saveScore(name,lastScore);
  document.getElementById('name-input').value='';
  document.getElementById('name-overlay').classList.remove('active');
  showGameOver();
}

if('ontouchstart'in window){
  document.getElementById('touch-controls').style.display='none';
}
</script>
</body>
</html>
