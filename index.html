<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Pars</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#07070f;--panel:#0f0f1a;--pink:#ff006e;--yellow:#ffbe0b;--green:#00ff88;--dim:#4a4a6a;--text:#d0d0ff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'Press Start 2P',monospace;min-height:100vh;overflow:hidden;color:var(--text);}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:100;}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%);pointer-events:none;z-index:99;}

  /* MENÜ */
  #menu{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:20px;position:relative;z-index:10;}
  #menu h1{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.3rem,6vw,2.8rem);letter-spacing:0.2em;text-align:center;margin-bottom:6px;animation:flicker 4s infinite;}
  @keyframes flicker{0%,94%,100%{opacity:1}95%{opacity:.7}97%{opacity:.5}98%{opacity:1}}
  .t1{color:var(--yellow);text-shadow:0 0 15px var(--yellow),0 0 40px var(--yellow);}
  .t2{color:var(--pink);text-shadow:0 0 15px var(--pink),0 0 40px var(--pink);}
  .pars-big{font-size:clamp(3rem,10vw,5rem);animation:bounce 1.2s ease-in-out infinite;filter:drop-shadow(0 0 16px rgba(255,190,11,0.9));}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .start-btn{background:transparent;border:2px solid var(--pink);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:clamp(0.55rem,2.5vw,0.75rem);padding:14px 28px;cursor:pointer;letter-spacing:0.15em;text-shadow:0 0 10px var(--pink);border-radius:4px;animation:glow-btn 2s infinite;width:100%;max-width:300px;}
  @keyframes glow-btn{0%,100%{box-shadow:0 0 10px rgba(255,0,110,0.3)}50%{box-shadow:0 0 30px rgba(255,0,110,0.7)}}
  .start-btn:active{background:rgba(255,0,110,0.15);transform:scale(0.97);}
  .menu-lb{width:100%;max-width:360px;background:rgba(255,0,110,0.06);border:1px solid rgba(255,0,110,0.2);border-radius:6px;padding:14px;}
  .menu-lb h3{font-size:clamp(0.38rem,1.8vw,0.52rem);color:var(--yellow);text-shadow:0 0 8px var(--yellow);text-align:center;margin-bottom:10px;letter-spacing:0.1em;}
  .lb-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;margin-bottom:4px;background:rgba(255,255,255,0.03);border-radius:3px;gap:6px;}
  .lb-rank{font-size:clamp(0.28rem,1.4vw,0.38rem);min-width:22px;color:var(--dim);}
  .lb-rank.g{color:var(--yellow);text-shadow:0 0 5px var(--yellow);}
  .lb-rank.s{color:#aaaacc;}
  .lb-rank.b{color:#cc8844;}
  .lb-name{font-size:clamp(0.28rem,1.4vw,0.38rem);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
  .lb-score{font-size:clamp(0.28rem,1.4vw,0.38rem);color:var(--pink);text-shadow:0 0 4px var(--pink);}
  .lb-empty{font-size:clamp(0.26rem,1.2vw,0.35rem);color:var(--dim);text-align:center;padding:8px;}

  /* OYUN */
  #game{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:10;}
  #game-canvas{display:block;border:1px solid rgba(255,0,110,0.25);box-shadow:0 0 20px rgba(255,0,110,0.1),0 0 60px rgba(255,0,110,0.05);border-radius:2px;image-rendering:pixelated;}

  /* HUD üst bar */
  #hud{display:none;position:fixed;top:0;left:0;right:0;padding:8px 14px;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,0,110,0.15);z-index:500;flex-direction:row;align-items:center;justify-content:space-between;}
  .hud-left{display:flex;flex-direction:column;gap:4px;}
  .hud-coins{font-size:clamp(0.4rem,2vw,0.56rem);color:var(--yellow);text-shadow:0 0 7px var(--yellow);}
  .hud-level{font-size:clamp(0.36rem,1.8vw,0.5rem);color:var(--pink);text-shadow:0 0 6px var(--pink);}
  .hud-score{font-size:clamp(0.8rem,3.5vw,1.2rem);color:var(--yellow);text-shadow:0 0 10px var(--yellow);}
  .hud-best{font-size:clamp(0.3rem,1.4vw,0.42rem);color:var(--dim);text-align:right;}

  /* Tap butonu */
  #tap-btn{display:none;position:fixed;bottom:18px;left:50%;transform:translateX(-50%);width:86%;max-width:400px;padding:20px;background:rgba(255,0,110,0.1);border:2px solid rgba(255,0,110,0.45);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:clamp(0.65rem,3vw,0.85rem);border-radius:12px;cursor:pointer;text-shadow:0 0 8px var(--pink);touch-action:manipulation;user-select:none;-webkit-user-select:none;z-index:500;}
  #tap-btn:active{background:rgba(255,0,110,0.28);transform:translateX(-50%) scale(0.96);}

  /* Overlay */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:600;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;backdrop-filter:blur(4px);}
  .overlay.show{display:flex;}
  .overlay h2{font-family:'Orbitron',monospace;font-size:clamp(0.9rem,4vw,1.6rem);color:var(--pink);text-shadow:0 0 20px var(--pink);text-align:center;}
  .score-big{font-size:clamp(1.1rem,5.5vw,1.8rem);color:var(--yellow);text-shadow:0 0 14px var(--yellow);}
  .new-rec{font-size:clamp(0.36rem,1.7vw,0.5rem);color:var(--green);text-shadow:0 0 10px var(--green);animation:glow-btn 1s infinite;}
  .breakdown{font-size:clamp(0.26rem,1.3vw,0.36rem);color:var(--dim);text-align:center;line-height:2.4;background:rgba(255,255,255,0.03);border-radius:4px;padding:10px 14px;border:1px solid rgba(255,255,255,0.05);width:100%;max-width:280px;}
  .breakdown span{color:var(--yellow);}
  .go-lb{width:100%;max-width:300px;background:rgba(255,0,110,0.05);border:1px solid rgba(255,0,110,0.12);border-radius:4px;padding:10px;}
  .go-lb h4{font-size:clamp(0.3rem,1.5vw,0.42rem);color:var(--yellow);text-align:center;margin-bottom:8px;}
  .ov-btn{background:transparent;border:2px solid var(--pink);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:clamp(0.48rem,2.2vw,0.65rem);padding:13px 20px;cursor:pointer;letter-spacing:0.12em;text-shadow:0 0 8px var(--pink);border-radius:3px;width:100%;max-width:280px;animation:glow-btn 2s infinite;}
  .ov-btn:active{background:rgba(255,0,110,0.15);}
  .ov-btn.green{border-color:var(--green);color:var(--green);text-shadow:0 0 8px var(--green);}
  .name-input{background:rgba(255,0,110,0.08);border:1px solid rgba(255,0,110,0.4);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:clamp(0.42rem,2vw,0.58rem);padding:12px 14px;border-radius:3px;text-align:center;width:100%;max-width:260px;letter-spacing:0.1em;outline:none;}
  .name-input::placeholder{color:var(--dim);}
  .name-input:focus{border-color:rgba(255,0,110,0.8);box-shadow:0 0 12px rgba(255,0,110,0.25);}
</style>
</head>
<body>

<!-- MENÜ -->
<div id="menu">
  <h1><span class="t1">FLAPPY</span> <span class="t2">PARS</span></h1>
  <div class="pars-big">🐆</div>
  <button class="start-btn" id="start-btn">▶ OYNA</button>
  <div class="menu-lb">
    <h3>🏆 LİDERLİK TABLOSU</h3>
    <div id="lb-menu"><div class="lb-empty">Yükleniyor...</div></div>
  </div>
  <div style="font-size:clamp(0.22rem,1.1vw,0.32rem);color:var(--dim);text-align:center;line-height:2.2;">
    🪙 Altın = 5 × Seviye &nbsp;|&nbsp; Boru = 10 × Seviye
  </div>
</div>

<!-- OYUN -->
<div id="game">
  <canvas id="game-canvas"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-left">
    <div class="hud-coins" id="hud-coins">🪙 0</div>
    <div class="hud-level" id="hud-level">SEVİYE 1</div>
  </div>
  <div><div class="hud-score" id="hud-score">0</div></div>
  <div><div class="hud-best" id="hud-best">EN İYİ: 0</div></div>
</div>

<button id="tap-btn">🐆 ZIPLA!</button>

<!-- OYUN SONU -->
<div class="overlay" id="ov-go">
  <h2>OYUN BİTTİ</h2>
  <div class="score-big" id="go-score">0</div>
  <div class="new-rec" id="go-rec" style="display:none;">★ YENİ REKOR! ★</div>
  <div class="breakdown" id="go-bd"></div>
  <div class="go-lb"><h4>🏆 LİDERLİK</h4><div id="lb-go"></div></div>
  <button class="ov-btn" id="btn-restart">▶ TEKRAR</button>
  <button class="ov-btn green" id="btn-menu">ANA MENÜ</button>
</div>

<!-- İSİM -->
<div class="overlay" id="ov-name">
  <h2>🏆 YENİ REKOR!</h2>
  <div class="score-big" id="name-sc">0</div>
  <p style="font-size:clamp(0.3rem,1.4vw,0.42rem);color:var(--dim);">İsmin nedir?</p>
  <input class="name-input" id="name-inp" maxlength="10" placeholder="İSMİNİ YAZ" autocomplete="off"/>
  <button class="ov-btn" id="btn-save">KAYDET ▶</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBLwHbX1MwJEzyJ71GRtLkcChkgatFAgS0",
  authDomain:"flappy-pars.firebaseapp.com",
  databaseURL:"https://flappy-pars-default-rtdb.firebaseio.com",
  projectId:"flappy-pars",
  storageBucket:"flappy-pars.firebasestorage.app",
  messagingSenderId:"995587188702",
  appId:"1:995587188702:web:e0042cb45d617b47ef9f4f"
});
const db=firebase.database();
const REF=db.ref('flappy_pars_scores');
let LB=[];

REF.orderByChild('score').limitToLast(10).on('value',snap=>{
  LB=[];
  snap.forEach(c=>LB.push(c.val()));
  LB.sort((a,b)=>b.score-a.score);
  renderLB('lb-menu',LB,10);
});

function saveSc(name,score){REF.push({name:name.toUpperCase().slice(0,10),score,date:Date.now()});}

function renderLB(id,data,max){
  const el=document.getElementById(id);
  if(!el)return;
  if(!data.length){el.innerHTML='<div class="lb-empty">Henüz skor yok</div>';return;}
  const M=['🥇','🥈','🥉'],C=['g','s','b'];
  el.innerHTML=data.slice(0,max).map((r,i)=>`
    <div class="lb-row">
      <span class="lb-rank ${C[i]||''}">${M[i]||i+1}</span>
      <span class="lb-name">${r.name}</span>
      <span class="lb-score">${r.score}</span>
    </div>`).join('');
}

// ── CANVAS — İLK VERSIYONDAKI GİBİ SABİT BOYUT ──
const CV=document.getElementById('game-canvas');
const CX=CV.getContext('2d');

// İlk versiyondaki gibi ekrana göre ama makul boyut
const W=Math.min(Math.floor(window.innerWidth*0.82),360);
const H=Math.min(Math.floor(window.innerHeight*0.78),580);
CV.width=W; CV.height=H;

// ── SABİTLER — İLK VERSİYON DEĞERLERİ ──
const PIPE_W=44;
const COIN_R=10;
const MAX_LV=20;
const PIPE_V=10, COIN_V=5;

// Çok yavaş başlayıp kademeli zorlaşan değerler
const GR_S=0.14, GR_M=0.40;
const JP_S=-5.0, JP_M=-7.4;
const SP_S=1.1,  SP_M=3.6;
const GA_S=190,  GA_M=108;

let bird,pipes,coins,parts;
let score,coins_n,lv,sp,ga,gr,jp;
let run,aid,frm;
let lscore,lcoins,lpipes;
let best=parseInt(localStorage.getItem('fp7')||'0');

const STARS=Array.from({length:55},()=>({
  x:Math.random()*400,y:Math.random()*600,
  r:Math.random()*1.4+0.3,a:Math.random(),da:0.004+Math.random()*0.012
}));

function lvv(s,m,l){return s+(m-s)*Math.min((l-1)/(MAX_LV-1),1);}
function applyLv(){sp=lvv(SP_S,SP_M,lv);ga=lvv(GA_S,GA_M,lv);gr=lvv(GR_S,GR_M,lv);jp=lvv(JP_S,JP_M,lv);}

function initBird(){bird={x:W*0.25,y:H*0.45,vy:0,r:15,alive:true};}

function addPipe(){
  const topH=50+Math.random()*(H-ga-130);
  pipes.push({x:W+PIPE_W,topH,passed:false});
  const mid=topH+ga/2,sp2=(W*0.55)/3;
  for(let i=0;i<3;i++){
    coins.push({
      x:W+PIPE_W+20+sp2*i+Math.random()*15,
      y:mid+(Math.random()-0.5)*ga*0.45,
      ok:false,a:Math.random()*Math.PI*2
    });
  }
}

function fx(x,y,col){
  for(let i=0;i<10;i++){
    const ang=(Math.PI*2/10)*i,s=1.5+Math.random()*3;
    parts.push({x,y,vx:Math.cos(ang)*s,vy:Math.sin(ang)*s-1,life:1,decay:0.05+Math.random()*0.03,col,sz:2+Math.random()*3});
  }
}

function drawBg(){
  const g=CX.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#080418');g.addColorStop(0.6,'#0d1030');g.addColorStop(1,'#0a1820');
  CX.fillStyle=g;CX.fillRect(0,0,W,H);
  STARS.forEach(s=>{
    s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;
    CX.globalAlpha=s.a*0.65;CX.fillStyle='#fff';
    CX.beginPath();CX.arc(s.x,s.y,s.r,0,Math.PI*2);CX.fill();
  });
  CX.globalAlpha=1;
}

function drawGround(){
  CX.fillStyle='#0d200d';CX.fillRect(0,H-28,W,28);
  CX.strokeStyle='#00ff88';CX.lineWidth=2;
  CX.beginPath();CX.moveTo(0,H-28);CX.lineTo(W,H-28);CX.stroke();
  CX.strokeStyle='rgba(0,255,136,0.15)';CX.lineWidth=1;
  for(let x=(frm*sp)%30;x<W;x+=30){
    CX.beginPath();CX.moveTo(x,H-28);CX.lineTo(x+15,H);CX.stroke();
  }
}

function drawPipes(){
  pipes.forEach(p=>{
    const tg=CX.createLinearGradient(p.x,0,p.x+PIPE_W,0);
    tg.addColorStop(0,'#005520');tg.addColorStop(0.4,'#00aa44');tg.addColorStop(1,'#003310');
    CX.shadowColor='#00ff66';CX.shadowBlur=8;CX.fillStyle=tg;
    CX.fillRect(p.x,0,PIPE_W,p.topH);
    CX.fillRect(p.x-4,p.topH-16,PIPE_W+8,16);
    const by=p.topH+ga;
    CX.fillRect(p.x,by,PIPE_W,H-by-28);
    CX.fillRect(p.x-4,by,PIPE_W+8,16);
    CX.shadowBlur=0;
  });
}

function drawCoins(){
  coins.forEach(c=>{
    if(c.ok)return;
    c.a+=0.08;
    const w=Math.sin(c.a)*3;
    CX.shadowColor='#ffbe0b';CX.shadowBlur=14;
    CX.fillStyle='#ffbe0b';
    CX.beginPath();CX.arc(c.x,c.y+w,COIN_R,0,Math.PI*2);CX.fill();
    CX.shadowBlur=0;
    CX.fillStyle='#ffe566';
    CX.beginPath();CX.arc(c.x-3,c.y+w-3,COIN_R*0.4,0,Math.PI*2);CX.fill();
    CX.fillStyle='#cc8800';
    CX.font=`bold ${COIN_R}px serif`;
    CX.textAlign='center';CX.textBaseline='middle';
    CX.fillText('₺',c.x,c.y+w+1);
  });
}

function drawParts(){
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=p.decay;
    CX.globalAlpha=Math.max(0,p.life);
    CX.shadowColor=p.col;CX.shadowBlur=6;CX.fillStyle=p.col;
    CX.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  });
  CX.globalAlpha=1;CX.shadowBlur=0;
}

function drawBird(){
  CX.save();
  CX.translate(bird.x,bird.y);
  CX.rotate(Math.max(-0.5,Math.min(Math.PI/2,bird.vy*0.065)));
  CX.shadowColor='#ffbe0b';CX.shadowBlur=20;
  CX.font=`${bird.r*2.2}px serif`;
  CX.textAlign='center';CX.textBaseline='middle';
  CX.fillText('🐆',0,0);
  CX.shadowBlur=0;CX.restore();
}

function drawHUDCanvas(){
  // Sol üst: altın ve seviye canvas içinde
  CX.shadowColor='rgba(255,190,11,0.6)';CX.shadowBlur=8;
  CX.fillStyle='#ffbe0b';
  CX.font=`${Math.min(W*0.05,14)}px 'Press Start 2P',monospace`;
  CX.textAlign='left';
  CX.fillText(`🪙 ${coins_n}`,10,22);
  CX.font=`${Math.min(W*0.045,12)}px 'Press Start 2P',monospace`;
  CX.fillStyle='#ff006e';
  CX.shadowColor='rgba(255,0,110,0.6)';
  CX.fillText(`SEVİYE ${lv}`,10,40);
  // Orta: skor
  CX.shadowColor='rgba(255,190,11,0.8)';CX.shadowBlur=12;
  CX.fillStyle='#ffbe0b';
  CX.font=`bold ${Math.min(W*0.09,28)}px 'Press Start 2P',monospace`;
  CX.textAlign='center';
  CX.fillText(score,W/2,36);
  CX.shadowBlur=0;
}

function update(){
  if(!bird.alive)return;
  frm++;
  bird.vy+=gr;bird.y+=bird.vy;
  if(bird.y+bird.r>=H-28||bird.y-bird.r<=0){die();return;}

  for(let i=pipes.length-1;i>=0;i--){
    pipes[i].x-=sp;
    if(!pipes[i].passed&&pipes[i].x+PIPE_W<bird.x){
      pipes[i].passed=true;
      score+=PIPE_V*lv;
      const pc=pipes.filter(p=>p.passed).length;
      if(pc>0&&pc%5===0){lv=Math.min(lv+1,MAX_LV);applyLv();}
    }
    if(bird.x+bird.r*0.7>pipes[i].x-4&&bird.x-bird.r*0.7<pipes[i].x+PIPE_W+4){
      if(bird.y-bird.r*0.7<pipes[i].topH||bird.y+bird.r*0.7>pipes[i].topH+ga){die();return;}
    }
    if(pipes[i].x+PIPE_W<-10)pipes.splice(i,1);
  }

  for(let i=coins.length-1;i>=0;i--){
    coins[i].x-=sp;
    if(!coins[i].ok){
      const dx=bird.x-coins[i].x,dy=bird.y-coins[i].y;
      if(Math.sqrt(dx*dx+dy*dy)<bird.r+COIN_R){
        coins[i].ok=true;coins_n++;
        score+=COIN_V*lv;
        fx(coins[i].x,coins[i].y,'#ffbe0b');
      }
    }
    if(coins[i].x<-20)coins.splice(i,1);
  }

  const rate=Math.max(44,132-lv*4);
  if(frm%rate===0)addPipe();
}

function loop(){
  update();
  drawBg();drawPipes();drawCoins();drawParts();drawGround();drawBird();drawHUDCanvas();
  if(run)aid=requestAnimationFrame(loop);
}

function die(){
  bird.alive=false;run=false;cancelAnimationFrame(aid);
  lscore=score;lcoins=coins_n;lpipes=pipes.filter(p=>p.passed).length;
  if(score>best){best=score;localStorage.setItem('fp7',best);}
  const isTop=LB.length<10||score>(LB[LB.length-1]?.score||0);
  if(score>0&&isTop){
    document.getElementById('name-sc').textContent=score;
    document.getElementById('ov-name').classList.add('show');
  }else showGO();
}

function showGO(){
  document.getElementById('go-score').textContent=lscore;
  document.getElementById('go-rec').style.display=lscore>=best&&lscore>0?'block':'none';
  document.getElementById('go-bd').innerHTML=
    `Boru: <span>${lpipes}×${PIPE_V}</span> &nbsp; Altın: <span>${lcoins}×${COIN_V}</span><br>`+
    `Seviye: <span>${lv}</span> &nbsp; Toplam: <span>${lscore}</span>`;
  renderLB('lb-go',LB,5);
  document.getElementById('ov-go').classList.add('show');
}

function showGame(){
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='flex';
  if('ontouchstart'in window)document.getElementById('tap-btn').style.display='block';
}

function showMenu(){
  document.getElementById('ov-go').classList.remove('show');
  document.getElementById('ov-name').classList.remove('show');
  document.getElementById('game').style.display='none';
  document.getElementById('tap-btn').style.display='none';
  document.getElementById('menu').style.display='flex';
  renderLB('lb-menu',LB,10);
}

function startGame(){
  initBird();pipes=[];coins=[];parts=[];
  score=0;coins_n=0;lv=1;frm=0;
  applyLv();run=true;
  document.getElementById('ov-go').classList.remove('show');
  document.getElementById('ov-name').classList.remove('show');
  showGame();addPipe();
  if(aid)cancelAnimationFrame(aid);
  aid=requestAnimationFrame(loop);
}

function jump(){if(run)bird.vy=jp;}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
CV.addEventListener('click',jump);
CV.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
document.getElementById('tap-btn').addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
document.getElementById('tap-btn').addEventListener('click',jump);
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('btn-restart').addEventListener('click',startGame);
document.getElementById('btn-menu').addEventListener('click',showMenu);
document.getElementById('btn-save').addEventListener('click',saveN);
document.getElementById('name-inp').addEventListener('keydown',e=>{if(e.key==='Enter')saveN();});

function saveN(){
  const n=document.getElementById('name-inp').value.trim();
  if(!n){document.getElementById('name-inp').focus();return;}
  saveSc(n,lscore);
  document.getElementById('name-inp').value='';
  document.getElementById('ov-name').classList.remove('show');
  showGO();
}
</script>
</body>
</html>
